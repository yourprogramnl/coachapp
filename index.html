<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachApp</title>
<style>
:root{--bg:#f4f6fa;--panel:#ffffff;--panel2:#ffffff;--line:#e3e7ef;--txt:#1b2330;--muted:#73808f;--accent:#2f6df6;--accent2:#15a36b;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.wrap{max-width:100%;margin:0 auto;padding:20px 26px 70px}
.logo{font-weight:800;font-size:22px;letter-spacing:1px}.logo b{color:var(--accent)}
.muted{color:var(--muted)} .hidden{display:none!important}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:16px}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.5;cursor:default}
input,select,textarea{width:100%;background:#ffffff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--txt);font-size:14px;font-family:inherit}
textarea{min-height:54px;resize:vertical}
label{font-size:13px;font-weight:600;color:var(--muted)}
.field{margin-bottom:13px}
#login{max-width:380px;margin:8vh auto 0}#login .card{padding:26px}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tabs button{flex:1;padding:9px;border-radius:9px;background:#f1f4f8;border:1px solid var(--line);color:var(--muted);font-weight:600;cursor:pointer;font-family:inherit}
.tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.msg{font-size:13px;margin-top:10px;min-height:18px}.msg.err{color:var(--bad)}.msg.ok{color:var(--ok)}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.rolepill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;background:rgba(79,139,255,.16);color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;background:linear-gradient(135deg,#3a4a6b,#2a3550);flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:15px}
.stat .n{font-size:24px;font-weight:800}.stat .n.acc{color:var(--accent)}.stat .n.ok{color:var(--ok)}
.stat .l{font-size:12px;color:var(--muted);margin-top:3px}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}.row.click{cursor:pointer}.row.click:hover{background:rgba(79,139,255,.06)}
.row .nm{font-weight:600;font-size:14px}.row .sub{font-size:12px;color:var(--muted)}
.tag{font-size:11px;padding:3px 9px;border-radius:999px;background:#f1f4f8;border:1px solid var(--line);color:var(--muted)}
h2{font-size:20px;margin-bottom:4px}h3{font-size:15px;margin:18px 0 10px}
.note{font-size:13px;color:var(--muted);line-height:1.5;margin-top:8px}
.back{font-size:13px;color:var(--accent);cursor:pointer;display:inline-block;margin-bottom:10px}
.block{background:#f1f4f8;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px}
.block .bh{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.badge{min-width:30px;height:26px;padding:0 6px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.presc{font-size:13px;color:var(--muted);margin-left:39px}
.spin{color:var(--muted);font-size:13px;padding:20px;text-align:center}
/* ===== Klant-scherm: kalender naar het ontwerp ===== */
.i{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;vertical-align:-2px}
.i.sm-i{width:13px;height:13px}
.client-layout{display:flex;background:#fff;border:1px solid #e7e9ec;border-radius:12px;overflow:hidden;min-height:640px}
.cside{width:230px;flex-shrink:0;background:#16181c;color:#e6e8ea}
.cside-in{padding:14px 0 8px;display:flex;flex-direction:column;min-height:100%}
.cside .prof{padding:0 16px 10px;border-bottom:1px solid #2a2d33}
.cside .bigav{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#6366f1);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;margin-bottom:8px}
.cside .cnm{font-weight:700;font-size:13px}
.cside .cinfo{font-size:11px;color:#8f959d;margin-top:4px;line-height:1.5}
.cside .streak{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#c9cdd4;padding:7px 16px;border-bottom:1px solid #2a2d33}
.cnav{padding:6px;flex:1}
.cnav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:600;color:#aab0b8;background:none;border:none;cursor:pointer;font-family:inherit}
.cnav button:hover{background:#22252b;color:#fff}
.cnav button.on{background:#2a2e35;color:#fff}
.cnav .i{width:13px;height:13px}
.cnav .soon{margin-left:auto;font-size:8.5px;color:#6b7280;border:1px solid #33373d;border-radius:6px;padding:1px 5px}
.cmain{flex:1;min-width:0;display:flex;flex-direction:column;background:#f6f7f8}
.calhead{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #e7e9ec;flex-wrap:wrap}
.calhead .month{font-size:16px;font-weight:800}
.navarrows{display:flex;gap:2px}
.navarrows button{width:28px;height:28px;border-radius:6px;color:#8a919c;font-size:14px;background:none;border:none;cursor:pointer;font-family:inherit}
.navarrows button:hover{background:#f0f1f3}
.seg{display:flex;background:#eef1f4;border-radius:8px;padding:3px}
.seg button{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;color:#8a919c;background:none;border:none;cursor:pointer;font-family:inherit}
.seg button.on{background:#fff;color:#1d2129;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.progsel{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e7e9ec;border-radius:10px;padding:6px 12px}
.progsel .pav{width:30px;height:30px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:linear-gradient(135deg,#38bdf8,#6366f1)}
.progsel .pn{font-weight:700;font-size:12.5px;line-height:1.2}
.progsel .pt{font-size:10.5px;color:#8a919c}
.tgl{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#8a919c;cursor:pointer;user-select:none;background:none;border:none;font-family:inherit}
.tgl .sw{width:34px;height:19px;border-radius:999px;background:#dfe3e8;position:relative;transition:background .15s}
.tgl .sw::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .15s}
.tgl.on .sw{background:#27b376}
.tgl.on .sw::after{left:17px}
.mhead7{display:grid;grid-template-columns:repeat(7,1fr);background:#171719;color:#fff}
.mhead7 div{padding:8px 10px;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;text-align:center}
.mrow{display:grid;grid-template-columns:repeat(7,1fr)}
.mday{border-right:1px solid #f0f1f3;border-bottom:1px solid #e7e9ec;min-height:122px;padding:3px 4px 6px;background:#fff;position:relative}
.mday:last-child{border-right:none}
.mday.dim2{background:#fafbfc}
.mday-top{display:flex;align-items:center;gap:5px;padding:3px 3px 5px;color:#b3b9c2}
.mday-top .i{width:12px;height:12px}
.restchip{border:1px solid #e7e9ec;border-radius:999px;padding:0 7px;font-size:9.5px;font-weight:600;color:#8a919c;line-height:15px}
.dnum2{margin-left:auto;font-size:12px;font-weight:700;color:#1d2129}
.dnum2.today{color:#3eb3e0}
.mday.today-cell{outline:2px solid #6ec4e8;outline-offset:-2px;background:#fcfeff}
.addrow2{display:flex;gap:5px;margin-bottom:6px}
.addnewbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid #e7e9ec;border-radius:7px;background:#fff;color:#8a919c;font-size:11px;font-weight:600;padding:5px 0;cursor:pointer;font-family:inherit}
.addnewbtn:hover{border-color:#b3b9c2;color:#2a9fce}
.sqbtn{width:30px;display:flex;align-items:center;justify-content:center;border:1px solid #e7e9ec;border-radius:7px;background:#fff;color:#8a919c;cursor:pointer}
.sqbtn:hover{border-color:#b3b9c2}
.mcard{border:1.5px solid #9fdcb8;border-radius:9px;padding:6px;background:#fff;position:relative;cursor:pointer;margin-bottom:6px}
.mcard.planned{border-color:#e7e9ec}
.mcard .msc{font-weight:800;font-size:12px;padding:2px 2px 5px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.mcard .delx{color:#b3b9c2;cursor:pointer;font-size:13px;padding:0 3px;flex-shrink:0}
.mcard .delx:hover{color:#e5484d}
.cblk{background:#eef2f7;border-radius:5px;padding:5px 7px;margin-bottom:4px;font-size:10.5px;line-height:1.42;position:relative;border-left:3px solid transparent}
.cblk .n{font-weight:700;font-size:11px;padding-right:14px}
.cblk .pr{color:#5d6570;white-space:pre-line}
.cblk.linked2{border-left-color:#8b7cf6}
.cblk.k-grijs{background:#f4f4f5}.cblk.k-roze{background:#fce8ec}.cblk.k-oranje{background:#fdeede}.cblk.k-geel{background:#fdf6d9}.cblk.k-blauw{background:#ddedfb}.cblk.k-groen{background:#e3f5e9}
.cblk .okc{position:absolute;right:5px;bottom:5px;width:14px;height:14px;border-radius:50%;background:#27b376;color:#fff;display:flex;align-items:center;justify-content:center}
.cblk .okc .i{width:9px;height:9px;stroke-width:2.4}
.cblk .okc.miss{background:#e5484d}
.loginp{background:#fff;border:1px solid #e7e9ec;border-radius:5px;padding:3px 7px;margin-top:4px;font-size:10.5px}
.combtn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid #e7e9ec;border-radius:7px;padding:6px 0;font-size:10.5px;font-weight:700;color:#4a4f57;background:#fff;margin-top:3px;cursor:pointer;font-family:inherit}
.combtn:hover{border-color:#b3b9c2}
.f-opts{display:flex;gap:6px;margin-top:6px}
.f-opts select{flex:1;font-size:11px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--txt);width:auto}
.toast2{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#171719;color:#fff;font-size:12.5px;padding:10px 18px;border-radius:9px;z-index:500;opacity:0;transition:opacity .2s;pointer-events:none}
.toast2.show{opacity:.95}

/* ===== Bibliotheek (naar het ontwerp) ===== */
.libgrid{display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:start}
@media(max-width:820px){.libgrid{grid-template-columns:1fr}}
.libnav{padding:10px;display:flex;flex-direction:column;gap:2px}
.libnav button{display:flex;align-items:center;gap:9px;text-align:left;padding:9px 11px;border-radius:8px;font-size:12.5px;font-weight:600;color:#5d6570;background:none;border:none;cursor:pointer;font-family:inherit}
.libnav button:hover{background:#f0f2f4}
.libnav button.on{background:#171719;color:#fff}
.thead{display:flex;align-items:center;padding:10px 18px;background:#f2f4f6;border-bottom:1px solid #e7e9ec;font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#8a919c;gap:12px}
.trow{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid #f0f1f3;gap:12px}
.trow:last-child{border-bottom:none}
.search2{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e7e9ec;border-radius:8px;padding:9px 13px;flex:1;max-width:520px;color:#b3b9c2}
.search2 input{border:none;flex:1;background:none;color:#1d2129;padding:0;width:auto}
.srcbadge{min-width:26px;height:22px;padding:0 4px;border-radius:6px;background:#171719;color:#fff;font-size:8px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.legchip{display:inline-flex;align-items:center;gap:6px;border:1px solid #e7e9ec;border-radius:999px;padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer;background:#fff;color:#5d6570}
.legchip.aan{border-color:#171719;background:#171719;color:#fff}
.lmodal{position:fixed;inset:0;background:rgba(15,18,22,.55);display:none;align-items:center;justify-content:center;z-index:400}
.lmodal.show{display:flex}
.lmodal .box{background:#fff;border-radius:14px;padding:20px;width:460px;max-width:92vw;max-height:88vh;overflow:auto}
.lmodal h3{margin-bottom:12px}
.kleurdots{display:flex;gap:10px;margin:6px 0 14px}
.kleurdots span{width:26px;height:26px;border-radius:50%;cursor:pointer;display:inline-block}
.kleurdots span.aan{outline:3px solid #171719;outline-offset:2px}

/* ===== Bouwer: bibliotheek-zoeker, demo-video en blokkleur (naar het ontwerp) ===== */
.exrow{position:relative}
.blokkleur{display:flex;gap:6px;align-items:center}
.blokkleur span{width:14px;height:14px;border-radius:50%;cursor:pointer;display:inline-block}
.exdrop{position:absolute;left:6px;top:100%;margin-top:4px;z-index:80;background:#fff;border:1px solid #e7e9ec;border-radius:12px;box-shadow:0 16px 44px rgba(15,18,22,.16);width:262px;padding:5px 0;display:none;max-height:280px;overflow:auto}
.exdrop.show{display:block}
.exdrop .hd{padding:8px 14px 5px;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:#8a919c}
.exopt{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer}
.exopt:hover{background:#f2f8fb}
.exopt .en{font-weight:700;font-size:12.5px}
.exopt .ep{font-size:10.5px;color:#8a919c;margin-top:1px}
.exopt .srcbadge{margin-left:auto}
.vidpop{position:absolute;right:-6px;top:100%;margin-top:6px;z-index:90;background:#fff;border:1px solid #e7e9ec;border-radius:12px;box-shadow:0 16px 44px rgba(15,18,22,.18);width:238px;padding:12px;display:none}
.vidpop.show{display:block}
.vidpop .vt{font-weight:800;font-size:12.5px;margin-bottom:8px;padding-right:18px}
.vidpop .vprev{background:#0d0f12;border-radius:8px;height:118px;position:relative;margin-bottom:8px;overflow:hidden}
.vidpop .vp-x{position:absolute;top:9px;right:12px;cursor:pointer;color:#8a919c;font-size:13px;z-index:5}
.vidpop .vp-x:hover{color:#e5484d}
.vidpop .vprev .vlabel{position:absolute;top:8px;left:8px;right:8px;color:#fff;font-size:10.5px;opacity:.85}
.vidpop .vprev .pbtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:27px;background:#e5484d;border-radius:6px;display:flex;align-items:center;justify-content:center}
.vidpop .vprev .pbtn::after{content:"";border-left:11px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:2px}
.vidpop .vp-cap{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#8a919c}
.blokchips{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}
.vidchip{display:inline-flex;align-items:center;gap:8px;background:#f2f4f6;border-radius:8px;padding:6px 10px;font-size:11.5px;font-weight:600}
.vidchip .x{color:#b3b9c2;cursor:pointer}
.ic-btn.has-video{color:#2a9fce}
.cblk.k-yellow{background:#fdf4d5}.cblk.k-blue{background:#e0edfd}.cblk.k-purple{background:#ece4fb}.cblk.k-red{background:#fbe0e0}.cblk.k-green{background:#def4e6}.cblk.k-orange{background:#fdeada}

/* ===== Bouwer in ontwerp-stijl (ib2) + dag-menu + superset-cirkels ===== */
.ib2{background:#fff;border:1.5px solid #3eb3e0;border-radius:12px;padding:9px;font-size:12px;box-shadow:0 14px 40px rgba(15,18,22,.10);text-align:left;margin-bottom:6px}
.ib2 .sec{background:#f6f7f8;border-radius:9px;padding:9px 10px;margin-bottom:8px;position:relative;border:none}
.ib2 input,.ib2 textarea{width:100%;border:none;background:none;font-size:12px;padding:3px 0;resize:none;font-family:inherit;color:#1d2129;min-height:22px;overflow:hidden}
.ib2 ::placeholder{color:#b3b9c2}
.ib2 .row-title{font-weight:800}
.ib2 .demolink{font-size:11px;color:#b3b9c2;cursor:pointer;padding:3px 0}
.ib2 .demolink:hover{color:#2a9fce}
.ib2 .exhead{display:flex;align-items:center;gap:7px}
.ib2 .exhead .lbl-badge{background:none;color:#2a9fce;font-weight:800;font-size:12.5px;flex:none;min-width:0;height:auto;padding:0;display:inline;border-radius:0}
.ib2 .exhead .lbl-badge::after{content:")"}
.ib2 .exhead input{font-weight:700}
.ib2 .extools{display:flex;gap:6px;color:#b3b9c2;margin-left:auto;flex:none;align-items:center}
.ib2 .extools .ic-btn{color:#b3b9c2}
.ib2 .extools .ic-btn:hover{color:#5d6570}
.ib2 .extools .ic-btn.has-video{color:#2a9fce}
.ib2 .corner{position:absolute;top:8px;right:9px;display:flex;gap:8px;color:#b3b9c2}
.ib2 .addbtns{display:flex;gap:6px;margin-bottom:8px}
.ib2 .addbtns button{flex:1;border:1px solid #e7e9ec;border-radius:8px;padding:8px 0;font-size:11.5px;font-weight:700;background:#fff;cursor:pointer;font-family:inherit;color:#1d2129}
.ib2 .addbtns button:hover{border-color:#b3b9c2}
.ib2 .addbtns .iconly{flex:0 0 34px;display:flex;align-items:center;justify-content:center;color:#8a919c}
.ib2 .foot{display:flex;gap:8px;flex-wrap:wrap}
.ib2 .foot .save{background:#3eb3e0;color:#fff;font-weight:700;border-radius:8px;padding:8px 14px;font-size:12px;border:none;cursor:pointer;font-family:inherit}
.ib2 .foot .save:hover{background:#2a9fce}
.ib2 .foot .cancel{border:1px solid #e7e9ec;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;background:#fff;cursor:pointer;font-family:inherit;color:#1d2129}
.ib2 .exrow{border:none;padding:9px 10px;margin-bottom:0}
.ib2 .exrow.linked{border-left:none}
.ib2 .f-opts select{border:1px solid #e7e9ec;width:auto}
.sslink{display:flex;justify-content:center;align-items:center;width:24px;height:24px;border:1px solid #e7e9ec;border-radius:50%;background:#fff;cursor:pointer;margin:-2px auto 3px;position:relative;z-index:3;color:#8a919c}
.sslink:hover{border-color:#9aa0a8}
.sslink.aan{border-color:#3eb3e0;color:#2a9fce;background:#eaf6fb}
.daymenu{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px;background:#fff;border:1px solid #e7e9ec;border-radius:12px;box-shadow:0 14px 40px rgba(15,18,22,.14);margin-bottom:8px}
.daymenu button{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 6px;border-radius:9px;font-size:11px;font-weight:700;color:#4a4f57;background:none;border:none;cursor:pointer;font-family:inherit}
.daymenu button:hover{background:#f0f1f3}
.daymenu .i{width:17px;height:17px;color:#5d6570}
.mday.tall{min-height:420px}
.noscores .loginp,.noscores .okc{display:none!important}

/* ===== Statbar, klantentabel, contact-avatars, feed-rijen (naar het ontwerp) ===== */
.statbar2{background:#fff;border:1px solid #e7e9ec;border-radius:12px;display:grid;grid-template-columns:repeat(4,1fr);padding:20px 10px;margin-bottom:18px;text-align:center}
.statbar2 .n{font-size:24px;font-weight:800}
.statbar2 .n.acc{color:#2a9fce}
.statbar2 .l{font-size:10.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:#8a919c;margin-top:4px}
.statbar2 select{margin-top:8px;font-size:12px;padding:5px 8px;border:1px solid #e7e9ec;border-radius:7px;background:#fff;width:auto;font-family:inherit}
.cmav{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11.5px;color:#5d6570;font-weight:600}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://ujuvbxqgnxkyjcmcrqpw.supabase.co";
const SUPABASE_KEY="sb_publishable_e_959eiOehMLgZzfZDFiuQ_2UVK-z_c";
let db=null;
try{
  if(typeof supabase==="undefined"||!supabase.createClient) throw new Error("lib");
  db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});
}catch(e){
  document.body.innerHTML='<div style="max-width:460px;margin:14vh auto;font-family:sans-serif;color:#1b2330;text-align:center;padding:24px"><h2 style="color:#4f8bff">Open in een gewone browser</h2><p style="color:#8a94a6;line-height:1.6">Deze app werkt niet in een klein voorbeeldvenster. Open de link in Chrome of Edge.</p></div>';
}
const ROLE_NL={platform_admin:"Platform-admin",eigenaar:"Eigenaar",coach:"Coach",lid:"Lid"};
const DAGEN=["MA","DI","WO","DO","VR","ZA","ZO"];
const MAANDVOL=["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const pad=n=>String(n).padStart(2,"0");
const ymd=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const todayStr=()=>ymd(new Date());
const mondayOf=d=>{const x=new Date(d);const k=(x.getDay()+6)%7;x.setDate(x.getDate()-k);x.setHours(0,0,0,0);return x;};
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
let ME={user:null,profile:null};
const MAANDKORT=["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
function toast(t){let e=document.getElementById("toast2");if(!e){e=document.createElement("div");e.id="toast2";e.className="toast2";document.body.appendChild(e);}e.textContent=t;e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("show"),2600);}
function resultScoreTxt(r){if(!r)return"";if(r.time_seconds!=null)return Math.floor(r.time_seconds/60)+":"+pad(r.time_seconds%60);if(r.load_kg!=null)return r.load_kg+" kg";if(r.rounds!=null)return r.rounds+" rondes"+(r.reps!=null?" + "+r.reps:"");if(r.reps!=null)return r.reps+" reps";return r.score_text||"";}
const KLEUREN=[["","geen kleur"],["grijs","grijs"],["roze","roze"],["oranje","oranje"],["geel","geel"],["blauw","blauw"],["groen","groen"]];
const SCORETYPES=[["text","vrije tekst"],["time","tijd"],["load","gewicht"],["reps","reps"],["rounds_reps","rondes+reps"],["none","geen score"]];
const selOpts=(list,cur)=>list.map(o=>'<option value="'+o[0]+'"'+(o[0]===(cur||list[0][0])?" selected":"")+'>'+o[1]+'</option>').join("");
const AVKLEUREN=["linear-gradient(135deg,#38bdf8,#6366f1)","linear-gradient(135deg,#f472b6,#a855f7)","linear-gradient(135deg,#fb923c,#ef4444)","linear-gradient(135deg,#34d399,#0d9488)","linear-gradient(135deg,#a78bfa,#6366f1)","linear-gradient(135deg,#facc15,#f97316)"];
const avStijl=naam=>{let h=0;for(const c of String(naam||"?"))h=(h*31+c.charCodeAt(0))>>>0;return "background:"+AVKLEUREN[h%AVKLEUREN.length];};

function composePresc(b){
  if(b.kind==="conditioning")return b.notes||"";
  if(b.prescription)return b.prescription;
  const segs=[];const sr=[b.sets,b.reps].filter(Boolean).join(" x ");
  if(sr)segs.push(sr);if(b.tempo)segs.push("@ "+b.tempo);
  let s=segs.join(" ");if(b.rest)s+=(s?" · ":"")+"rust "+b.rest;return s;
}

let mode="in";
function setMode(m){mode=m;document.getElementById("tab-in").classList.toggle("on",m==="in");document.getElementById("tab-up").classList.toggle("on",m==="up");document.getElementById("go").textContent=m==="in"?"Inloggen":"Account maken";setMsg("");}
function setMsg(t,k){const e=document.getElementById("msg");e.textContent=t||"";e.className="msg "+(k||"");}
async function submitAuth(){
  const email=document.getElementById("email").value.trim(),pw=document.getElementById("pw").value;
  if(!email||!pw){setMsg("Vul e-mail en wachtwoord in.","err");return;}
  document.getElementById("go").disabled=true;
  try{
    if(mode==="in"){const{error}=await db.auth.signInWithPassword({email,password:pw});if(error)throw error;}
    else{const{error}=await db.auth.signUp({email,password:pw});if(error)throw error;setMsg("Account gemaakt. Mogelijk e-mail bevestigen, log daarna in.","ok");document.getElementById("go").disabled=false;setMode("in");return;}
    await loadApp();
  }catch(e){setMsg(e.message||"Er ging iets mis.","err");}
  document.getElementById("go").disabled=false;
}
function show(which){if(which!=="app")document.body.classList.remove("coachmode");document.getElementById("login").classList.toggle("hidden",which!=="login");document.getElementById("app").classList.toggle("hidden",which!=="app");}
async function signOut(){await db.auth.signOut();document.getElementById("pw").value="";show("login");}

async function loadApp(){
  const{data:{user}}=await db.auth.getUser();
  if(!user){show("login");return;}
  const{data:profile}=await db.from("profiles").select("*").eq("id",user.id).single();
  ME={user,profile:profile||{role:"lid"}};
  // Uitnodiging inwisselen (?invite=TOKEN in de link): serverside koppeling aan bedrijf/rol/coach
  const inviteToken=new URLSearchParams(location.search).get("invite");
  if(inviteToken){
    const{error}=await db.rpc("redeem_invite",{p_token:inviteToken});
    history.replaceState(null,"",location.pathname);
    if(error)toast("Uitnodiging: "+(error.message||"inwisselen mislukt"));
    else{
      toast("Uitnodiging geaccepteerd, welkom!");
      const{data:p2}=await db.from("profiles").select("*").eq("id",user.id).single();
      if(p2)ME.profile=p2;
    }
  }
  const role=ME.profile.role||"lid";
  document.getElementById("roleLabel").textContent=ROLE_NL[role]||role;
  document.getElementById("avatar").textContent=(user.email||"?").slice(0,1).toUpperCase();
  show("app");
  const tb=document.querySelector(".topbar");if(tb)tb.style.display="";
  if(role==="lid")renderLid();
  else renderCoach("dash");
}
function header(title,sub){return '<h2>'+esc(title)+'</h2>'+(sub?'<div class="muted">'+esc(sub)+'</div>':'');}
const naamVan=p=>esc([p.first_name,p.last_name].filter(Boolean).join(" ")||p.email);

// ---------- COACH / EIGENAAR / ADMIN — gedeeld dashboard ----------
let coachClients=[],coachExercises=[],monthWorkouts={},sideCollapsed=false,coachSection="dash";

const myRole=()=>(ME.profile&&ME.profile.role)||"lid";
// Tabs per rol: coach ziet geen "Coaches"; platform_admin krijgt extra "Bedrijven"
function cnavItems(){
  const role=myRole();
  const n=[["dash","Dashboard"],["clients","Klanten"],["library","Bibliotheek"]];
  if(role!=="coach")n.push(["coaches","Coaches"]);
  n.push(["programs","Programma's"],["week","Weekworkout"],["msgs","Berichten"]);
  if(role==="platform_admin")n.push(["companies","Bedrijven"]);
  return n;
}
async function renderCoach(section){
  coachSection=section||"dash";
  const tb=document.querySelector(".topbar");if(tb)tb.style.display="none";
  const c=document.getElementById("content");c.innerHTML='<div class="cwrap"><div class="spin">Laden…</div></div>';
  // Coach: eigen klanten. Eigenaar/admin: alle leden van het bedrijf.
  let q=db.from("profiles").select("*").eq("role","lid");
  if(myRole()==="coach")q=q.eq("coach_id",ME.user.id);
  else if(ME.profile.company_id)q=q.eq("company_id",ME.profile.company_id);
  const{data:clients}=await q;
  coachClients=clients||[];
  const{data:exs}=await db.from("exercises").select("name").order("name");
  coachExercises=exs||[];
  const dl=document.getElementById("exlist");if(dl)dl.innerHTML=coachExercises.map(e=>'<option value="'+esc(e.name)+'">').join("");
  coachRenderSection();
}
function coachGo(sec){coachSection=sec;coachRenderSection();}
function coachShellHtml(inner){
  document.body.classList.add("coachmode");
  const btns=cnavItems().map(n=>'<button class="'+(n[0]===coachSection?"on":"")+'" onclick="coachGo(\''+n[0]+'\')">'+esc(n[1])+'</button>').join("");
  const av=esc((ME.profile.first_name||ME.user.email||"?").slice(0,1).toUpperCase());
  return '<div class="cwrap"><div class="cbar"><span class="logo">COACH<b>APP</b></span><div class="cnav2">'+btns+'</div>'+
    '<div class="cbar-right"><span style="font-size:10px;color:#8f959d;font-weight:700;text-transform:uppercase;letter-spacing:.6px">'+esc(ROLE_NL[myRole()]||"")+'</span><div class="cav">'+av+'</div><button class="lo" onclick="signOut()">Uitloggen</button></div></div>'+
    '<div id="cpage">'+inner+'</div></div>';
}
function coachRenderSection(){
  const c=document.getElementById("content");
  if(coachSection==="clients"){c.innerHTML=coachShellHtml('<div class="spin">Laden…</div>');fillKlanten();return;}
  if(coachSection==="dash"){c.innerHTML=coachShellHtml('<h1>Dashboard</h1><div class="dashgrid"><div class="panel"><div class="spin">Laden…</div></div><div></div></div>');fillDashboard();return;}
  if(coachSection==="coaches"){c.innerHTML=coachShellHtml('<h1>Coaches</h1><div class="spin">Laden…</div>');fillCoaches();return;}
  if(coachSection==="companies"){c.innerHTML=coachShellHtml('<h1>Bedrijven</h1><div class="spin">Laden…</div>');fillCompanies();return;}
  if(coachSection==="library"){c.innerHTML=coachShellHtml(libShellHtml());ensureLibModals();libLaad();libLijst();return;}
  const titles={programs:"Programma's",week:"Weekworkout",msgs:"Berichten"};
  c.innerHTML=coachShellHtml('<h1>'+esc(titles[coachSection]||"")+'</h1><div class="csoon">Deze sectie bouwen we hierna.<br>We zijn met het <b>Dashboard</b> begonnen; hier vind je straks '+esc((titles[coachSection]||"").toLowerCase())+'.</div>');
}
// ---------- KLANTEN-pagina (naar het ontwerp) ----------
let KDATA=null,klantPeriode=30,klantZoek="";
async function fillKlanten(){
  const ids=coachClients.map(p=>p.id);
  const td=todayStr(),from90=ymd(addDays(new Date(),-89)),plus14=ymd(addDays(new Date(),14));
  let ws=[],rs=[],msgs=[];
  if(ids.length){
    ws=(await db.from("workouts").select("id,client_id,workout_date,title").in("client_id",ids).gte("workout_date",from90).lte("workout_date",plus14).order("workout_date")).data||[];
    const wids=ws.map(w=>w.id);
    if(wids.length)rs=(await db.from("results").select("workout_id,status").in("workout_id",wids)).data||[];
    msgs=(await db.from("messages").select("athlete_id").in("athlete_id",ids).gte("created_at",ymd(mondayOf(new Date())))).data||[];
  }
  KDATA={ws:ws.filter(w=>!/^rest ?day$/i.test((w.title||"").trim())),done:new Set(rs.filter(r=>r.status==="completed").map(r=>r.workout_id)),msgs};
  klantenRender();
}
function klantWorkoutChip(p){
  const td=todayStr();
  const mijn=KDATA.ws.filter(w=>w.client_id===p.id);
  const up=mijn.filter(w=>w.workout_date>=td).sort((a,b)=>a.workout_date.localeCompare(b.workout_date))[0];
  if(up){
    const d=new Date(up.workout_date+"T00:00:00");
    const diff=Math.round((d-new Date(td+"T00:00:00"))/864e5);
    const lbl=diff===0?"vandaag":(diff<=6?DAGVOL[(d.getDay()+6)%7]:DAGEN[(d.getDay()+6)%7].toLowerCase()+" "+d.getDate()+" "+MAANDKORT[d.getMonth()]);
    return '<span class="wchip ok">'+esc(lbl)+'</span>';
  }
  const late=mijn.filter(w=>w.workout_date<td&&!KDATA.done.has(w.id)).sort((a,b)=>b.workout_date.localeCompare(a.workout_date))[0];
  if(late){const d=new Date(late.workout_date+"T00:00:00");return '<span class="wchip laat">'+DAGEN[(d.getDay()+6)%7].toLowerCase()+' '+d.getDate()+' '+MAANDKORT[d.getMonth()]+'</span>';}
  return '<span class="wchip leeg">geen gepland</span>';
}
function klantComp(list){
  const td=todayStr(),fromP=ymd(addDays(new Date(),-(klantPeriode-1)));
  const sched=KDATA.ws.filter(w=>w.workout_date>=fromP&&w.workout_date<=td&&list.some(c=>c.id===w.client_id));
  if(!sched.length)return null;
  return Math.round(sched.filter(w=>KDATA.done.has(w.id)).length/sched.length*100);
}
function klantRijen(){
  const zoek=klantZoek.toLowerCase();
  const lijst=coachClients.filter(p=>!zoek||naamVan(p).toLowerCase().includes(zoek)||(p.email||"").toLowerCase().includes(zoek)).sort((a,b)=>naamVan(a).localeCompare(naamVan(b)));
  return lijst.map(p=>{
    const wp=klantComp([p]);
    return '<div class="trow click" onclick="openClient(\''+p.id+'\')">'+
      '<div style="flex:2.2;display:flex;gap:11px;align-items:center"><div class="cavc" style="'+avStijl(naamVan(p))+'">'+esc(naamVan(p).slice(0,2).toUpperCase())+'</div><div><div style="font-weight:700;font-size:13px">'+naamVan(p)+'</div><div class="sm muted">Laatste consult: n.v.t.</div></div></div>'+
      '<div style="flex:1.2">'+klantWorkoutChip(p)+'</div>'+
      '<div style="flex:1.2"><span class="wchip leeg">niet ingesteld</span></div>'+
      '<div style="flex:1">'+(wp==null?'<span class="muted">–</span>':'<b style="color:'+(wp>=70?'#1d9a63':'#e5484d')+'">'+wp+'%</b>')+'</div>'+
      '<div style="flex:1.6" onclick="event.stopPropagation()"><button class="plusbtn" onclick="toast(\'Tags komen in een volgende stap\')">+</button></div>'+
      '<button class="kebab" onclick="event.stopPropagation();toast(\'Opties komen later\')">⋮</button></div>';
  }).join("");
}

function exportKlanten(){

async function fillCoaches(){
  let q=db.from("profiles").select("*").in("role",["coach","eigenaar"]);
  if(ME.profile.company_id)q=q.eq("company_id",ME.profile.company_id);
  const{data:coaches}=await q;
  // Prestaties per coach: compliance (30 dagen) en contactmomenten (deze week) van zijn klanten
  const ids=coachClients.map(p=>p.id);
  const td=todayStr(),from30=ymd(addDays(new Date(),-29));
  let ws=[],rs=[],msgs=[];
  if(ids.length){
    ws=((await db.from("workouts").select("id,client_id,workout_date,title").in("client_id",ids).gte("workout_date",from30).lte("workout_date",td)).data||[]).filter(w=>!/^rest ?day$/i.test((w.title||"").trim()));
    const wids=ws.map(w=>w.id);
    if(wids.length)rs=(await db.from("results").select("workout_id,status").in("workout_id",wids)).data||[];
    msgs=(await db.from("messages").select("athlete_id").in("athlete_id",ids).gte("created_at",ymd(mondayOf(new Date())))).data||[];

  const doneWo=new Set(rs.filter(r=>r.status==="completed").map(r=>r.workout_id));

  const compVan=list=>{const sched=ws.filter(w=>list.some(c=>c.id===w.client_id));if(!sched.length)return null;return Math.round(sched.filter(w=>doneWo.has(w.id)).length/sched.length*100);};
  const totaalComp=compVan(coachClients);
  const totaalCm=coachClients.length?Math.round(coachClients.filter(p=>gesprokenIds.has(p.id)).length/coachClients.length*100):null;
  const rows=(coaches||[]).sort((a,b)=>naamVan(a).localeCompare(naamVan(b))).map(c=>{
    const kl=coachClients.filter(k=>k.coach_id===c.id);

      '<div style="flex:1">'+(wp==null?'<span class="muted">–</span>':'<b style="color:'+(wp>=70?'#1d9a63':'#e5484d')+'">'+wp+'%</b>')+'</div>'+
      '<div style="flex:1" class="muted">–</div>'+
      '<div style="flex:1.2">'+(cm==null?'<span class="muted">0%</span>':'<b style="color:'+(cm>=70?'#1d9a63':'#8a919c')+'">'+cm+'%</b>')+'</div>'+
      '<div style="flex:1">'+rol+'</div>'+
      '<button class="kebab" onclick="toast(\'Opties komen later\')">⋮</button></div>';
  }).join("");
  const cp=document.getElementById("cpage");
  if(!cp)return;
  cp.innerHTML='<div class="statbar2">'+
    '<div><div class="n">'+coachClients.length+'</div><div class="l">Klanten totaal</div></div>'+
    '<div><div class="n acc">'+(totaalComp==null?'–':totaalComp+'%')+'</div><div class="l">Compliance</div></div>'+
    '<div><div class="n">–</div><div class="l">Consult-rate</div></div>'+

async function libLaad(){

  while(true){
    const{data,error}=await db.from("oefeningen").select("id,naam,youtube_id,video_url,tags,bron").order("naam").range(from,from+999);
    if(error){LIB.busy=false;const h=document.getElementById("lib-lijst");if(h)h.innerHTML='<div class="cempty">Kon de bibliotheek niet laden. Probeer het opnieuw.</div>';return;}
    alles=alles.concat(data||[]);
    if(!data||data.length<1000)break;
    from+=1000;
  }
  const{data:tpl}=await db.from("templates").select("id,naam,instructies,type,kleur,tags,coach").order("naam");
  LIB.oef=alles;LIB.tpl=tpl||[];LIB.geladen=true;LIB.busy=false;
  libLijst();
}

    return;
  }
  if(thead)thead.innerHTML='<div style="width:74px">Media</div><div style="flex:2.6">Oefening</div><div style="flex:1.6">Tags</div><div style="flex:.7">Van</div><div style="flex:.8">Video</div><div style="width:70px"></div>';
  if(cnt)cnt.textContent=LIB.oef.length+" video's";
  const hits=LIB.oef.filter(o=>!LIB.zoek||(o.naam||"").toLowerCase().includes(LIB.zoek)||(o.tags||[]).join(" ").toLowerCase().includes(LIB.zoek));
  const pages=Math.max(1,Math.ceil(hits.length/LIB_PER));
  if(LIB.pag>=pages)LIB.pag=pages-1;
  const deel=hits.slice(LIB.pag*LIB_PER,(LIB.pag+1)*LIB_PER);
  host.innerHTML=deel.map(o=>{
    const tags=(o.tags||[]).slice(0,3).map(t=>'<span class="tag">'+esc(t)+'</span>').join(" ");
    const thumb=o.youtube_id?'<img src="https://i.ytimg.com/vi/'+esc(o.youtube_id)+'/default.jpg" loading="lazy" style="width:64px;height:40px;object-fit:cover;border-radius:6px;display:block">':'<div style="width:64px;height:40px;border-radius:6px;background:#f4f4f5"></div>';
    const link=o.youtube_id?'<a class="cpill teal" href="https://youtu.be/'+esc(o.youtube_id)+'" target="_blank" rel="noopener" style="text-decoration:none" onclick="event.stopPropagation()">YouTube</a>':(o.video_url?'<a class="cpill teal" href="'+esc(o.video_url)+'" target="_blank" rel="noopener" style="text-decoration:none" onclick="event.stopPropagation()">video</a>':'<span class="cpill" style="background:#f4f4f5;color:#8a919c">geen</span>');
    const bron=o.bron==="coachrx"?"CRx":(o.bron&&o.bron!=="eigen"?String(o.bron).toUpperCase().slice(0,4):"");
    return '<div class="trow" style="cursor:pointer" onclick="oefBewerk('+o.id+')">'+
      '<div style="width:74px">'+thumb+'</div>'+
      '<div style="flex:2.6"><b>'+esc(o.naam)+'</b></div>'+
      '<div style="flex:1.6">'+tags+'</div>'+
      '<div style="flex:.7">'+(bron?'<span class="srcbadge">'+esc(bron)+'</span>':"")+'</div>'+
      '<div style="flex:.8">'+link+'</div>'+
      '<div style="width:70px"><button class="btn ghost sm">Bewerk</button></div></div>';
  }).join("")||'<div class="cempty">Geen oefeningen gevonden.</div>';
  if(!pag)return;
  if(pages<=1){pag.innerHTML="";return;}
  let kn='<button class="btn ghost sm" '+(LIB.pag===0?"disabled":'onclick="libGa('+(LIB.pag-1)+')"')+'>‹</button>';
  for(let p=0;p<pages;p++){
    if(p===0||p===pages-1||Math.abs(p-LIB.pag)<=2)kn+='<button class="btn sm '+(p===LIB.pag?"":"ghost")+'" onclick="libGa('+p+')">'+(p+1)+'</button>';
    else if((p===1&&LIB.pag>3)||(p===pages-2&&LIB.pag<pages-4))kn+='<span class="muted">…</span>';
  }
  kn+='<button class="btn ghost sm" '+(LIB.pag===pages-1?"disabled":'onclick="libGa('+(LIB.pag+1)+')"')+'>›</button>';
  pag.innerHTML=kn;
}
function libModalDicht(){document.getElementById("exmodal").classList.remove("show");document.getElementById("tplmodal").classList.remove("show");LIB.editOef=null;LIB.editTpl=null;}
function libNieuw(){if(LIB.mode==="oef")oefBewerk(null);else tplBewerk(null);}

async function exOpslaan(){
  const naam=document.getElementById("exmodal-naam").value.trim();
  const video=document.getElementById("exmodal-video").value.trim();
  const msg=document.getElementById("exmodal-msg");
  if(!naam){msg.textContent="Vul een naam in.";msg.className="msg err";return;}
  const yt=ytIdVan(video);
  const velden={naam,youtube_id:yt||"",video_url:yt?"":(video||"")};
  const wasEdit=!!LIB.editOef;
  let fout=null;
  if(wasEdit){const{error}=await db.from("oefeningen").update(velden).eq("id",LIB.editOef);fout=error;}
  else{velden.tags=["eigen"];velden.bron="eigen";const{error}=await db.from("oefeningen").insert(velden);fout=error;}
  if(fout){msg.textContent=fout.message||"Opslaan mislukt.";msg.className="msg err";return;}
  LIB.geladen=false;libModalDicht();toast(wasEdit?"Oefening bijgewerkt":"Oefening toegevoegd");
  await libLaad();
}
async function oefVerwijder(){
  if(!LIB.editOef||!confirm("Deze oefening verwijderen?"))return;
  const{error}=await db.from("oefeningen").delete().eq("id",LIB.editOef);
  if(error){const msg=document.getElementById("exmodal-msg");msg.textContent=error.message;msg.className="msg err";return;}
  LIB.geladen=false;libModalDicht();toast("Oefening verwijderd");
  await libLaad();
}
function tplKleurDots(){

function tplBewerk(id){
  LIB.editTpl=id;

  del.innerHTML=(o&&myRole()==="platform_admin")?'<button class="btn ghost sm" onclick="tplVerwijder()">Verwijderen</button>':"";

}
async function tplOpslaan(){
  const naam=document.getElementById("tpl-naam").value.trim();

async function tplVerwijder(){

let dashPeriode=30,dashFilter="alles",dashTaken="open",DASH=null;
async function fillDashboard(){
  const ids=coachClients.map(p=>p.id);
  const td=todayStr(),from90=ymd(addDays(new Date(),-89));
  let ws=[],rs=[],msgs=[],blog=null,blogRes=[];
  if(ids.length){
    ws=(await db.from("workouts").select("*, blocks(*)").in("client_id",ids).gte("workout_date",from90).lte("workout_date",td).order("workout_date",{ascending:false})).data||[];
    const wids=ws.map(w=>w.id);
    if(wids.length)rs=(await db.from("results").select("*").in("workout_id",wids)).data||[];
    msgs=(await db.from("messages").select("athlete_id,created_at").in("athlete_id",ids).gte("created_at",ymd(mondayOf(new Date())))).data||[];
  }
  const tasks=(await db.from("tasks").select("*").eq("owner_id",ME.user.id).order("created_at",{ascending:false})).data||[];
  if(ME.profile.company_id){
    blog=((await db.from("workouts").select("id,title,workout_date, blocks(*)").eq("company_id",ME.profile.company_id).eq("audience","blog").order("workout_date",{ascending:false}).limit(1)).data||[])[0]||null;
    if(blog)blogRes=(await db.from("results").select("athlete_id,created_at").eq("workout_id",blog.id)).data||[];
  }
  DASH={ws,rs,msgs,tasks,blog,blogRes};
  dashRender();
}
function dashSetFilter(f){if(f==="lifestyle"||f==="consult"){toast("Lifestyle en consults komen later");return;}dashFilter=f;dashRender();}
function dashSetPeriode(n){dashPeriode=n;dashRender();}
function dashSetTaken(t){dashTaken=t;dashRender();}
function dashRender(){
  const cp=document.getElementById("cpage");if(!cp||!DASH)return;
  const{ws,rs,msgs,tasks,blog,blogRes}=DASH;
  const td=todayStr(),from7=ymd(addDays(new Date(),-6));
  const byId={};coachClients.forEach(p=>byId[p.id]=p);
  const echte=ws.filter(w=>!/^rest ?day$/i.test((w.title||"").trim()));
  const doneWo=new Set(rs.filter(r=>r.status==="completed").map(r=>r.workout_id));
  const resByBlock={};rs.forEach(r=>resByBlock[r.block_id]=r);
  // Aandacht nodig
  const attn=[];let nTeDoen=0;
  coachClients.forEach(p=>{
    const wos=echte.filter(w=>w.client_id===p.id);
    const teDoen=wos.some(w=>w.workout_date>=from7&&w.workout_date<=td&&!doneWo.has(w.id));
    const past=wos.filter(w=>w.workout_date<td).sort((a,b)=>b.workout_date.localeCompare(a.workout_date));
    let miss=0;for(const w of past){if(doneWo.has(w.id))break;miss++;}
    if(teDoen)nTeDoen++;
    if(teDoen||miss>=2){
      const pills=[];
      if(teDoen)pills.push('<span class="cpill teal">Workout te doen</span>');
      if(miss>=2)pills.push('<span class="cpill bad">'+miss+'x gemist op rij</span>');
      attn.push({p,pills,teDoen});
    }
  });
  const attnRows=attn.filter(a=>dashFilter==="alles"||(dashFilter==="tedoen"&&a.teDoen));
  const attnHtml=attnRows.length?'<div class="attn-card">'+attnRows.map(a=>'<div class="attn-row click" onclick="openClient(\''+a.p.id+'\')"><div class="cavc" style="'+avStijl(naamVan(a.p))+'">'+esc(naamVan(a.p).slice(0,2).toUpperCase())+'</div><div class="nm">'+naamVan(a.p)+'</div><div class="pills">'+a.pills.join("")+'</div><div class="rowicons"><svg class="i sm-i" onclick="event.stopPropagation();toast(\'Berichten komen later\')"><use href="#i-chat"/></svg><svg class="i sm-i"><use href="#i-eye"/></svg><svg class="i sm-i"><use href="#i-cal"/></svg></div></div>').join("")+'</div>'
    :'<div class="attn-card"><div class="cempty">Niets dat nu je aandacht vraagt. 👍<br>Zodra een klant een workout mist of nog moet doen, zie je het hier.</div></div>';
  const chips='<div style="display:flex;gap:8px;margin:10px 0 12px;flex-wrap:wrap">'+
    '<span class="fchip'+(dashFilter==="alles"?" on":"")+'" onclick="dashSetFilter(\'alles\')">Alles</span>'+
    '<span class="fchip'+(dashFilter==="tedoen"?" on":"")+'" onclick="dashSetFilter(\'tedoen\')">Workout te doen ('+nTeDoen+')</span>'+
    '<span class="fchip" onclick="dashSetFilter(\'lifestyle\')">Lifestyle (0)</span>'+
    '<span class="fchip" onclick="dashSetFilter(\'consult\')">Consult (0)</span></div>';
  // Contactmomenten: chat-berichten deze week per klant
  const msgCount={};msgs.forEach(m=>msgCount[m.athlete_id]=(msgCount[m.athlete_id]||0)+1);
  const gesproken=coachClients.filter(p=>msgCount[p.id]).length;
  const cmPct=coachClients.length?Math.round(gesproken/coachClients.length*100):0;
  const mon=mondayOf(new Date());
  const monLbl=("0"+mon.getDate()).slice(-2)+"-"+("0"+(mon.getMonth()+1)).slice(-2)+"-"+mon.getFullYear();
  const cmHtml='<h2 style="margin:22px 0 4px">Contactmomenten <span class="muted" style="font-weight:600">('+cmPct+'%)</span></h2>'+
    '<div class="sm muted" style="margin-bottom:12px"><b>'+gesproken+' van '+coachClients.length+'</b> klanten deze week gesproken · week van maandag <b>'+monLbl+'</b></div>'+
    '<div style="display:flex;gap:26px;flex-wrap:wrap">'+coachClients.map(p=>'<div class="cmav click" onclick="openClient(\''+p.id+'\')" style="cursor:pointer"><span class="bol">'+esc(naamVan(p).slice(0,2).toUpperCase())+'</span>'+esc(p.first_name||naamVan(p))+' ('+(msgCount[p.id]||0)+')</div>').join("")+'</div>';
  // Activiteit: recente workouts met gelogde resultaten, als volledige kaarten
  const met=echte.filter(w=>rs.some(r=>r.workout_id===w.id)).slice(0,6);
  const feedHtml=met.length?met.map(w=>{
    const p=byId[w.client_id]||{};
    const blocks=(w.blocks||[]).slice().sort((a,b)=>a.sort-b.sort);
    let done=0;
    const rij=(badge,titel,tekst,r)=>{
      const sc=resultScoreTxt(r);
      return '<div class="fbrow"><span class="fbadge">'+esc(badge)+'</span><div class="fbody"><b>'+esc(titel)+'</b>'+(tekst?'<div class="pr2">'+esc(tekst)+'</div>':'')+(sc?'<div class="loginp">'+esc(sc)+'</div>':'')+'</div>'+
        '<div class="fside">'+(r?'<span class="okc2'+(r.status==="missed"?" miss":"")+'"><svg class="i sm-i"><use href="#'+(r.status==="missed"?"i-x":"i-check")+'"/></svg></span>':'')+'<svg class="i sm-i" onclick="toast(\'History komt in een volgende stap\')" style="cursor:pointer"><use href="#i-hist"/></svg></div></div>';
    };
    let rows="";
    if(w.warmup)rows+=rij("W","Warmup",w.warmup,null);
    blocks.forEach(b=>{
      const r=resByBlock[b.id];if(r&&r.status==="completed")done++;
      rows+=rij(b.label||"•",b.exercise||"Onderdeel",composePresc(b),r);
    });
    return '<div class="feedcard"><div class="fh"><div class="cavc" style="'+avStijl(naamVan(p))+'">'+esc(naamVan(p).slice(0,2).toUpperCase())+'</div><div style="flex:1"><b>'+naamVan(p)+'</b><div class="sm muted">Due '+esc(w.workout_date)+'</div></div></div>'+
      '<div class="fscore">'+done+'/'+blocks.length+'</div>'+rows+
      '<div class="notesend" style="display:flex;gap:6px;margin-top:10px;border-top:1px solid #f0f1f3;padding-top:10px"><button class="btn ghost sm" onclick="toast(\'Comments komen samen met de sporter-app\')"><svg class="i sm-i"><use href="#i-chat"/></svg> Comments</button><input placeholder="Note" style="flex:1;padding:7px 10px;font-size:12px" onkeydown="if(event.key===\'Enter\')stuurNote(\''+w.client_id+'\',this)"><button class="btn sm" onclick="stuurNote(\''+w.client_id+'\',this)">Send</button></div></div>';
  }).join(""):'<div class="feedcard"><div class="cempty">Nog geen gelogde workouts.<br>Zodra je sporters in de app resultaten invullen, verschijnen ze hier.</div></div>';
  // Mijn cijfers met 7/30/90 dagen (dropdown zoals het ontwerp)
  const fromP=ymd(addDays(new Date(),-(dashPeriode-1)));
  const sched=echte.filter(w=>w.workout_date>=fromP&&w.workout_date<=td);
  const done=sched.filter(w=>doneWo.has(w.id)).length;
  const pct=sched.length?Math.round(done/sched.length*100):null;
  const ringStyle=pct==null?'background:#e5e8eb':'background:conic-gradient(var(--accent) 0 '+pct+'%, #e5e8eb '+pct+'% 100%)';
  const perSel='<select onchange="dashSetPeriode(parseInt(this.value))" style="width:auto;font-size:12px;padding:5px 8px">'+[7,30,90].map(n=>'<option value="'+n+'"'+(dashPeriode===n?" selected":"")+'>'+n+' dagen</option>').join("")+'</select>';
  const ringHtml='<div class="statecard"><div class="ring" style="'+ringStyle+'"><i>'+(pct==null?'–':pct+'%')+'</i></div>'+
    '<div><b>Compliance klanten</b><div class="sm muted" style="margin-top:3px">'+(pct==null?'Geen geplande workouts in deze periode.':'Percentage van de voorgeschreven workouts dat je klanten echt gedaan hebben.')+'</div></div></div>';
  // Mijn taken (echt, uit de database)
  const open=tasks.filter(t=>!t.done),af=tasks.filter(t=>t.done);
  const lijst=dashTaken==="open"?open:af;
  const taakRows=lijst.map(t=>'<div style="display:flex;align-items:center;gap:9px;padding:7px 4px;border-bottom:1px solid #f0f1f3"><input type="checkbox" '+(t.done?"checked":"")+' onchange="taakToggle(\''+t.id+'\',this.checked)" style="width:15px;height:15px;flex:none"><span style="flex:1;font-size:12.5px;'+(t.done?"text-decoration:line-through;color:#8a919c":"")+'">'+esc(t.body)+'</span><span style="color:#b3b9c2;cursor:pointer;padding:0 4px" onclick="taakWeg(\''+t.id+'\')">×</span></div>').join("");
  const takenHtml='<div style="display:flex;gap:8px;margin-bottom:9px"><span class="fchip'+(dashTaken==="open"?" on":"")+'" onclick="dashSetTaken(\'open\')">Open'+(open.length?' ('+open.length+')':'')+'</span><span class="fchip'+(dashTaken==="af"?" on":"")+'" onclick="dashSetTaken(\'af\')">Afgerond'+(af.length?' ('+af.length+')':'')+'</span></div>'+
    '<div id="taak-row" style="display:none;gap:6px;margin-bottom:9px"><input id="taak-inp" placeholder="Nieuwe taak…" style="flex:1;padding:8px 10px;font-size:12.5px" onkeydown="if(event.key===\'Enter\')taakToevoegen()"><button class="btn sm" onclick="taakToevoegen()">Opslaan</button></div>'+
    '<div class="statecard" style="display:block;padding:6px 12px">'+(taakRows||'<div class="cempty" style="padding:16px 4px">'+(dashTaken==="open"?'Alles afgerond.<br><a style="color:var(--accent);cursor:pointer;font-weight:700" onclick="taakInvoer()">Klik hier</a> om een nieuwe taak te maken.':'Nog geen afgeronde taken.')+'</div>')+'</div>';
  // Workout van de week
  const deelnemers=new Set(blogRes.map(r=>r.athlete_id)).size;
  const vandaagN=blogRes.filter(r=>(r.created_at||"").slice(0,10)===td).length;
  const blogB=((blog||{}).blocks||[]).slice().sort((a,b)=>a.sort-b.sort)[0]||null;
  const blogSub=(blogB?(blogB.prescription||blogB.exercise||"").split("\n")[0]+" · ":"")+deelnemers+" deelnemers · "+vandaagN+" scores vandaag";
  const weekHtml=blog?'<div class="statecard" style="display:block"><div style="font-weight:800;font-size:14px">"'+esc(blog.title||"Weekworkout")+'"</div><div class="sm muted" style="margin:4px 0 12px">'+esc(blogSub)+'</div><button class="btn sm" onclick="coachGo(\'week\')">Bekijk leaderboard</button></div>'
    :'<div class="statecard" style="display:block"><div class="cempty" style="padding:8px 4px">Nog geen weekworkout ingepland.</div></div>';
  cp.innerHTML='<h1>Dashboard</h1><div class="dashgrid">'+
    '<div class="panel">'+
      '<div class="ctabs"><button class="on">Aandacht nodig</button><button onclick="toast(\'Inzichten komen later\')">Inzichten</button></div>'+
      chips+attnHtml+cmHtml+
      '<div style="display:flex;align-items:center;gap:14px;margin:26px 0 8px"><h2 style="margin:0">Activiteit</h2><div class="ctabs" style="margin:0"><button class="on">Workouts</button><button onclick="toast(\'Lifestyle komt later\')">Lifestyle</button><button onclick="toast(\'Check-ins komen later\')">Check-ins</button></div></div>'+
      feedHtml+
    '</div>'+
    '<div>'+
      '<div class="sideblock"><div class="shead"><h2>Mijn cijfers</h2>'+perSel+'</div>'+ringHtml+'</div>'+
      '<div class="sideblock"><div class="shead"><h2>Mijn taken</h2><button class="btn sm" onclick="taakInvoer()">+ Taak</button></div>'+takenHtml+'</div>'+
      '<div class="sideblock"><div class="shead"><h2>Workout van de week</h2>'+(blog?'<span class="cpill ok">live</span>':'')+'</div>'+weekHtml+'</div>'+
    '</div>'+
  '</div>';
}
function taakInvoer(){const r=document.getElementById("taak-row");if(!r)return;r.style.display="flex";const i=document.getElementById("taak-inp");if(i)i.focus();}
async function taakToevoegen(){
  const inp=document.getElementById("taak-inp");const v=(inp.value||"").trim();if(!v)return;
  const{data,error}=await db.from("tasks").insert({company_id:ME.profile.company_id,owner_id:ME.user.id,body:v}).select().single();
  if(error){toast(error.message||"Opslaan mislukt");return;}

// Sessies, streak en workout-te-doen in de zijbalk, berekend uit echte data
async function vulKlantStats(p){
  const[wq,rq]=await Promise.all([
    db.from("workouts").select("id,workout_date,title").eq("client_id",p.id),
    db.from("results").select("workout_id,status").eq("athlete_id",p.id)
  ]);
  const ws=(wq.data||[]).filter(w=>!/^rest ?day$/i.test((w.title||"").trim()));
  const doneIds=new Set((rq.data||[]).filter(r=>r.status==="completed").map(r=>r.workout_id));
  const el=id=>document.getElementById(id);
  const sessies=ws.filter(w=>doneIds.has(w.id)).length;
  if(el("cs-sessies"))el("cs-sessies").textContent=sessies;
  if(el("cs-minisess")){el("cs-minisess").textContent=sessies;el("cs-minisess").title=sessies+" sessies afgerond";}
  // streak: aaneengesloten weken (t/m deze of vorige week) met minstens één voltooide workout
  const weekSet=new Set(ws.filter(w=>doneIds.has(w.id)).map(w=>ymd(mondayOf(new Date(w.workout_date+"T00:00:00")))));
  let wk=mondayOf(new Date()),streak=0;
  if(!weekSet.has(ymd(wk)))wk=addDays(wk,-7);
  while(weekSet.has(ymd(wk))){streak++;wk=addDays(wk,-7);}
  if(el("cs-streak"))el("cs-streak").textContent=streak+(streak===1?" week":" weken");
  // workout te doen deze week
  const td=todayStr(),mon=ymd(mondayOf(new Date())),sun=ymd(addDays(mondayOf(new Date()),6));
  const open=ws.filter(w=>w.workout_date>=mon&&w.workout_date<=sun&&!doneIds.has(w.id)).sort((a,b)=>a.workout_date.localeCompare(b.workout_date));
  if(open.length&&el("cs-pills")){
    const d=new Date(open[0].workout_date+"T00:00:00");
    const lbl=open[0].workout_date===td?"vandaag":DAGEN[(d.getDay()+6)%7].toLowerCase();
    el("cs-pills").insertAdjacentHTML("afterbegin",'<span class="cpill bad" style="font-size:10px;padding:2px 8px">workout te doen: '+esc(lbl)+'</span>');
  }
  // vaste trainingsdagen (laatste 4 weken), zoals "woensdag · zaterdag" in het ontwerp
  const von=ymd(addDays(new Date(),-27));
  const dagIdx=[...new Set(ws.filter(w=>w.workout_date>=von&&w.workout_date<=td).map(w=>{const d=new Date(w.workout_date+"T00:00:00");return (d.getDay()+6)%7;}))].sort((a,b)=>a-b);
  if(dagIdx.length&&el("cs-dagen")){el("cs-dagen-txt").textContent=dagIdx.map(i=>DAGVOL[i]).join(" · ");el("cs-dagen").style.display="";}
  // naam van de coach in de kalender-kop (cache zodat renderMonth hem niet overschrijft)
  if(p.coach_id&&myRole()!=="coach"){
    const{data:cp}=await db.from("profiles").select("first_name").eq("id",p.coach_id).single();
    if(cp){coachChipNaam=cp.first_name||"";const cc=el("cs-coach");if(cc)cc.textContent="Coach "+coachChipNaam;}
  }
}

function kalLabelUpdate(){
  // het label = de maand-sectie waarin de bovenste zichtbare rij valt
  const kop=document.querySelector("#calwrap .mhead7");
  // als de dagenbalk niet plakt (mobiel) geldt de bovenrand van het scherm
  const grens=Math.max(kop?kop.getBoundingClientRect().bottom+8:150,12);
  const zet=d=>{
    kalLabelMaand=new Date(d.getFullYear(),d.getMonth(),1);
    const lbl=document.getElementById("mnd-label");
    if(lbl){const t=MAANDVOL[d.getMonth()];lbl.textContent=t.charAt(0).toUpperCase()+t.slice(1)+" "+d.getFullYear();}
  };
  const vanLabel=el=>{const p=(el.dataset.manchor||"").split("-");if(p.length===3)zet(new Date(parseInt(p[1],10),parseInt(p[2],10),1));};
  let sectie=null; // laatste maandbalk die al boven de kop is doorgeschoven
  for(const el of document.querySelectorAll("#calwrap .mrow[data-d], #calwrap .mlabel")){
    const onderGrens=el.getBoundingClientRect().bottom>grens;
    if(el.classList.contains("mlabel")){

      vanLabel(el);return; // maandbalk zelf bovenaan in beeld
    }
    if(!onderGrens)continue;
    if(sectie)vanLabel(sectie); // rij hoort bij de laatst gepasseerde maandbalk
    else zet(new Date(calRef.getFullYear(),calRef.getMonth(),1)); // vóór de eerste balk = startmaand

function mxWaarde(naam){
  const h=mxHist(naam);
  if(!h.length)return null;
  const cur=h[h.length-1],vorig=h.length>1?h[h.length-2]:null;
  return{cur,vorig,unit:cur.unit||""};
}

function mxRender(){
  const host=document.getElementById("mx-groepen");if(!host)return;
  const groepen=mxGroepen();let html="";
  for(const g in groepen){
    html+='<div class="mx-hd" onclick="mxToggle(\''+g.replace(/'/g,"\\'")+'\')"><span>'+esc(g)+'</span><span class="plus" title="Meting toevoegen" onclick="event.stopPropagation();openMxModal(\'\')">+</span></div>';
    if(mxOpen[g]){
      html+='<div class="mx-cols"><div style="flex:1.7">Naam</div><div style="flex:.6">Huidig</div><div style="flex:.4;text-align:right">+/-</div></div>';
      groepen[g].forEach(naam=>{
        const w=mxWaarde(naam);
        let pm="–",pmKl="#8b919b";
        if(w&&w.vorig&&w.cur.value!=null&&w.vorig.value!=null&&w.cur.value!==w.vorig.value){
          const d=Math.round((w.cur.value-w.vorig.value)*10)/10;
          pm=(d>0?"▲ +":"▼ ")+d;pmKl=d>0?"#27b376":"#e5484d";
        }
        html+='<div class="mx-row" onclick="openMxModal(\''+naam.replace(/'/g,"\\'")+'\')"><div class="mx-naam">'+esc(naam)+'</div><div class="mx-cur">'+(w?esc(String(w.cur.value))+" "+esc(w.unit):"—")+'</div><div class="mx-pm" style="color:'+pmKl+'">'+pm+'</div></div>';
      });
    }
  }
  host.innerHTML=html;
}

function metricsRender(){

    const w=mxWaarde(naam);

    return '<div class="metrow"'+(act?' style="background:#f0f8fc"':'')+' onclick="balKies(\''+naam.replace(/'/g,"\\'")+'\')"><span>'+(act?'<b>'+esc(naam)+'</b>':esc(naam))+'</span>'+val+'</div>';

    '<div class="metmain"><div class="metcards">'+
    '<div class="metcard" style="grid-column:span 2"><h3>'+esc(balKeuze)+' <span class="muted sm" style="font-weight:400">· laatste 6 metingen</span></h3>'+
    '<div class="val">'+esc(waarde)+' <span class="delta">'+esc(delta)+'</span></div>'+
    (spark?'<div class="spark">'+spark+'</div>':'<div class="nodata" style="border:1px dashed #e7e9ec;border-radius:8px;color:#b3b9c2;font-size:11.5px;text-align:center;padding:14px 6px;margin-top:10px">Nog geen metingen. Voeg de eerste toe via + Voeg toe.</div>')+'</div>'+

// Blokkleuren zoals het ontwerp: 6 legendakleuren met slimme standaard per oefening
function kleurVoorOefening(naam){
  const n=String(naam||"").toLowerCase();
  let b=null;(LIB.oef||[]).forEach(o=>{if(!b&&(o.naam||"").toLowerCase()===n)b=o;});
  const t=n+" "+(b?(b.tags||[]).join(" "):"");
  if(/stretch|mobilit|breath|adem|foam|cool.?down|pigeon|cars\b|herstel/.test(t))return "green";
  if(/muscle.?up|handstand|hspu|ring|toes to bar|t2b|rope climb|lever|planche|gymnast/.test(t))return "purple";
  if(/bike|erg\b|\brun|ski\b|amrap|interval|metcon|burpee|double.?under|sprint|conditioning|for time|emom|wod/.test(t))return "yellow";
  if(/squat|deadlift|press|bench|pull.?up|chin.?up|row|curl|lunge|rdl|hip thrust|clean|snatch|jerk|carry|dip\b|raise|extension|swing|thruster|barbell|dumbbell|kettlebell|kracht/.test(t))return "blue";
  return "orange";
}

function relabel(){
  const host=document.getElementById("exrows");if(!host)return;
  host.querySelectorAll(".sslink").forEach(x=>x.remove());
  const rows=[...host.querySelectorAll(".exrow")];if(!rows.length)return;
  rows[0].dataset.linked="0";rows[0].classList.remove("linked");
  let groups=[];
  rows.forEach((r,i)=>{if(i>0&&r.dataset.linked==="1"){groups[groups.length-1].push(r);}else{groups.push([r]);}});
  groups.forEach((g,gi)=>{const L=String.fromCharCode(65+gi);g.forEach((r,pos)=>{const bd=r.querySelector(".lbl-badge");if(bd)bd.textContent=g.length>1?L+(pos+1):L;});});
  // superset-cirkels tussen de blokken (zoals het ontwerp)
  rows.forEach((r,i)=>{
    if(i===rows.length-1)return;
    const d=document.createElement("div");
    d.className="sslink"+(rows[i+1].dataset.linked==="1"?" aan":"");
    d.title="Koppel als superset";
    d.innerHTML='<svg class="i sm-i"><use href="#i-link"/></svg>';
    d.onclick=ev=>{ev.stopPropagation();const nxt=rows[i+1];const on=nxt.dataset.linked!=="1";nxt.dataset.linked=on?"1":"0";nxt.classList.toggle("linked",on);relabel();};
    r.parentNode.insertBefore(d,rows[i+1]);
  });
}

    const kleur=b.color?' k-'+esc(b.color):'';
    const lk=b.linked?' linked2':'';
    const pr=composePresc(b);
    const sc=resultScoreTxt(r);
    inner+='<div class="cblk'+kleur+lk+'"><div class="n">'+esc(b.label||"")+') '+esc(b.exercise||"")+'</div>'+
      (pr?'<div class="pr">'+esc(pr)+'</div>':'')+
      (sc?'<div class="loginp">'+esc(sc)+'</div>':'')+
      (r?'<span class="okc'+(r.status==="missed"?' miss':'')+'"><svg class="i"><use href="#'+(r.status==="missed"?'i-x':'i-check')+'"/></svg></span>':'')+
      '</div>';
  });
  if(w.cooldown)inner+='<div class="cblk k-grijs"><div class="n">Cooldown</div><div class="pr">'+esc(w.cooldown)+'</div></div>';
  return '<div class="mcard'+(done===0?' planned':'')+'" onclick="editWorkout(\''+w.id+'\',0)">'+
    '<div class="msc"><span>'+done+'/'+total+' · '+esc(w.title||"Workout")+'</span><span class="delx" onclick="event.stopPropagation();delWorkout(\''+w.id+'\')">×</span></div>'+inner+
    '<button class="combtn" onclick="event.stopPropagation();toast(\'Comments komen in een volgende stap\')"><svg class="i sm-i"><use href="#i-chat"/></svg> Comments</button></div>';
}

  else if(calView==="week"){gridStart=mondayOf(ref);cellCount=7;cols=7;}
  else{gridStart=new Date(ref);gridStart.setHours(0,0,0,0);cellCount=1;cols=1;}
  const gridEnd=addDays(gridStart,cellCount-1);
  const{data:workouts}=await db.from("workouts").select("*, blocks(*)").eq("client_id",id).gte("workout_date",ymd(gridStart)).lte("workout_date",ymd(gridEnd)).order("workout_date");
  monthWorkouts={};monthByDate={};const byDate=monthByDate;(workouts||[]).forEach(w=>{monthWorkouts[w.id]=w;(byDate[w.workout_date]=byDate[w.workout_date]||[]).push(w);});

    const{data:res}=await db.from("results").select("*").eq("athlete_id",id).in("workout_id",wids);
    (res||[]).forEach(r=>{monthResults[r.block_id]=r;});
  }
  const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
  let label;
  if(calView==="maand"){const basis=kalLabelMaand||ref;label=cap(MAANDVOL[basis.getMonth()])+" "+basis.getFullYear();}
  else if(calView==="week")label=gridStart.getDate()+" "+MAANDKORT[gridStart.getMonth()]+" – "+gridEnd.getDate()+" "+MAANDKORT[gridEnd.getMonth()]+" "+gridEnd.getFullYear();
  else label=cap(DAGVOL[(gridStart.getDay()+6)%7])+" "+gridStart.getDate()+" "+MAANDKORT[gridStart.getMonth()]+" "+gridStart.getFullYear();
  const seg=[["dag","Dag"],["week","Week"],["maand","Maand"]].map(v=>'<button class="'+(calView===v[0]?"on":"")+'" onclick="kalSetView(\''+v[0]+'\')">'+v[1]+'</button>').join("");
  const calhead='<div class="calhead">'+

    '<span class="month" id="mnd-label">'+label+'</span>'+
    '<div class="navarrows"><button onclick="prevMonth()">‹</button><button onclick="nextMonth()">›</button></div>'+
    '<button class="btn ghost sm" onclick="thisMonth()">Vandaag</button>'+
    '<div class="seg">'+seg+'</div>'+
    '<div class="progsel" style="margin-left:auto" onclick="toast(\'Programma-weergaven (team/templates) komen later\')"><div class="pav" style="background:linear-gradient(135deg,#171719,#3a3f47)">'+esc((myRole()==="coach"?(ME.profile.first_name||"C"):(coachChipNaam||"C")).slice(0,1).toUpperCase())+'</div><div><div class="pn" id="cs-coach">Coach '+esc(myRole()==="coach"?(ME.profile.first_name||""):coachChipNaam)+'</div><div class="pt">1:1</div></div><span class="car">▾</span></div>'+
    '<div class="progsel" id="klantsel" onclick="toggleKlantDrop(event)"><div class="pav" style="'+avStijl(naamVan(p))+'">'+esc(naamVan(p).slice(0,2).toUpperCase())+'</div><div><div class="pn">'+naamVan(p)+'</div><div class="pt">Klant'+(coachChipNaam||myRole()==="coach"?' · '+esc(myRole()==="coach"?(ME.profile.first_name||""):coachChipNaam)+' ('+coachClients.filter(k=>k.coach_id===p.coach_id).length+')':'')+'</div></div><span class="car">▾</span>'+
      '<div class="progdrop" id="klantdrop" onclick="event.stopPropagation()"><div class="pd-search"><svg class="i sm-i"><use href="#i-search"/></svg><input placeholder="Zoek een klant…" oninput="filterKlantDrop(this.value)"></div><div class="pd-lijst" id="kd-lijst">'+
      coachClients.slice().sort((a,b)=>naamVan(a).localeCompare(naamVan(b))).map(k=>'<div class="pd-row'+(k.id===p.id?' actief':'')+'" data-n="'+esc(naamVan(k).toLowerCase())+'" onclick="openClient(\''+k.id+'\')"><div class="pd-badge" style="'+avStijl(naamVan(k))+'">'+esc(naamVan(k).slice(0,2).toUpperCase())+'</div><div class="pd-naam">'+naamVan(k)+'</div><span class="pd-vink"><svg class="i sm-i"><use href="#i-check"/></svg></span></div>').join("")+
      '</div></div></div>'+
    '<div class="seg"><button class="on">Workouts</button><button onclick="toast(\'Lifestyle komt later\')">Lifestyle</button></div>'+
    '<button class="tgl'+(hideScores?" on":"")+'" onclick="toggleScores(this)"><span class="sw"></span> Zonder scores</button>'+
    '<button class="btn ghost sm" title="Print of bewaar als PDF" onclick="window.print()"><svg class="i sm-i"><use href="#i-dl"/></svg> Export PDF</button>'+
    '</div>';
  const headDays=calView==="dag"?[DAGEN[(gridStart.getDay()+6)%7]]:DAGEN;

  let weeks="";

    for(let i=0;i<cols;i++){
      const d=addDays(gridStart,wk*cols+i),ds=ymd(d),isToday=ds===todayStr(),dim=calView==="maand"&&d.getMonth()!==ref.getMonth(),editing=ds===editDay;
      const dayWos=byDate[ds]||[];
      const dnum=(d.getDate()===1?MAANDKORT[d.getMonth()]+" ":"")+d.getDate();

      let selectable=false;
      if(editing){
        inner+=dayWos.filter(w=>w.id!==editWid).map(mcardHtml).join("");
        inner+='<div class="ib2" onclick="event.stopPropagation()">'+inlineBuilderHtml(editWid?monthWorkouts[editWid]:null)+'</div>';
      }else if(dayWos.length){
        inner+='<div class="addrow2"><button class="addnewbtn" onclick="openDayMenu(event,\''+ds+'\')">+ Add New</button><button class="sqbtn" title="Kopieer de workout van deze dag" onclick="event.stopPropagation();kopieerDag(\''+ds+'\')"><svg class="i sm-i"><use href="#i-copy"/></svg></button></div>';
        inner+=dayWos.map(mcardHtml).join("");
      }else{
        selectable=true; // lege dag: aanwijzen of klikken opent het dag-menu
      }
      cells+='<div class="mday'+(selectable?' selectable':'')+(calView!=="maand"?" tall":"")+(isToday?' today-cell':'')+(dim?' dim2':'')+'"'+(selectable?' onclick="openDayMenu(event,\''+ds+'\')" onmouseenter="openDayMenu(event,\''+ds+'\')" onmouseleave="dagLeave(this)"':'')+'>'+inner+'</div>';
    }
    // maand-scheidingsbalk vóór de week waarin een nieuwe maand begint (zoals CoachRx)
    if(calView==="maand"&&wk>0){
      const wkStart=addDays(gridStart,wk*cols);
      for(let i=0;i<7;i++){
        const dd=addDays(wkStart,i);
        if(dd.getDate()===1){
          const t=MAANDVOL[dd.getMonth()];
          weeks+='<div class="mlabel" data-manchor="m-'+dd.getFullYear()+'-'+dd.getMonth()+'">'+t.charAt(0).toUpperCase()+t.slice(1)+' '+dd.getFullYear()+'</div>';
          break;
        }
      }
    }
    weeks+='<div class="mrow" data-d="'+ymd(addDays(gridStart,wk*cols))+'"'+gridStyle+'>'+cells+'</div>';
  }
  m.innerHTML=calhead+'<div class="calscroll'+(hideScores?" noscores":"")+'" id="calwrap"><div class="mhead7"'+gridStyle+'>'+head+'</div>'+weeks+'</div>';
  if(editDay){relabel();groei();}
  if(calView==="maand"){
    kalScrollBind();
    // dagenbalk plakt onder de (variabele) kalenderkop
    const ch=m.querySelector(".calhead"),pg=document.getElementById("cpage");
    if(ch&&pg)pg.style.setProperty("--calh",Math.round(ch.getBoundingClientRect().height)+"px");
    if(kalScrollDoel){const doel=kalScrollDoel;kalScrollDoel=null;prevScrollY=null;requestAnimationFrame(()=>{kalScrollNaar(doel,true);setTimeout(kalLabelUpdate,80);});}
    else if(prevScrollY!=null){const y=prevScrollY;prevScrollY=null;window.scrollTo(0,y);kalLabelUpdate();}
  }
}

    const txt=[w.warmup,...(w.blocks||[]).slice().sort((a,b)=>a.sort-b.sort).map(b=>(b.exercise||"")+(b.prescription?"\n"+b.prescription:"")),w.cooldown].filter(Boolean).join("\n\n");

  });

async function saveWorkout(){
  const g=id=>document.getElementById(id);
  const title=g("w_title").value.trim();
  const rows=[...document.querySelectorAll("#exrows .exrow")].map((r,i)=>{const o=rowToObj(r);o.label=r.querySelector(".lbl-badge").textContent;o.sort=i+1;return o;}).filter(b=>b.exercise);
  const wm=g("wmsg");
  if(!title){wm.textContent="Geef de workout een titel.";wm.className="msg err";return;}
  g("saveW").disabled=true;
  const wf={title,coach_notes:g("w_notes").value.trim()||null,warmup:g("w_warmup").value.trim()||null,cooldown:g("w_cooldown").value.trim()||null};
  const mkBlocks=wid=>rows.map(b=>({workout_id:wid,kind:b.kind,label:b.label,linked:!!b.linked,exercise:b.exercise,prescription:b.prescription||null,notes:b.notes||null,sort:b.sort,color:b.color||null,score_type:b.score_type||"text",oefening_id:b.oefening_id||null}));
  try{
    if(editWid){
      const{error:ue}=await db.from("workouts").update(wf).eq("id",editWid);if(ue)throw ue;
      await db.from("blocks").delete().eq("workout_id",editWid);
      if(rows.length){const{error:be}=await db.from("blocks").insert(mkBlocks(editWid));if(be)throw be;}
    }else{
      const{data:w,error}=await db.from("workouts").insert(Object.assign({company_id:ME.profile.company_id,coach_id:ME.user.id,client_id:calClient,workout_date:editDay},wf)).select().single();
      if(error)throw error;
      if(rows.length){const{error:be}=await db.from("blocks").insert(mkBlocks(w.id));if(be)throw be;}
    }
    editWid=null;editDay=null;renderMonth();
  }catch(e){wm.textContent=e.message||"Opslaan mislukt.";wm.className="msg err";g("saveW").disabled=false;}
}

// ---------- LID ----------
async function renderLid(){
  document.body.classList.remove("coachmode");
  const c=document.getElementById("content");c.innerHTML='<div class="spin">Laden…</div>';
  const{data:today}=await db.from("workouts").select("*, blocks(*)").eq("client_id",ME.user.id).eq("workout_date",todayStr());
  const w=(today||[])[0];let body;
  if(w){
    let parts="";
    if(w.warmup)parts+='<div class="block"><div class="bh"><span class="badge" style="background:#3a4a6b">WU</span><b>Warming-up</b></div><div class="presc">'+esc(w.warmup)+'</div></div>';
    parts+=(w.blocks||[]).slice().sort((a,b)=>a.sort-b.sort).map(b=>{const pr=composePresc(b);return '<div class="block"><div class="bh"><span class="badge">'+esc(b.label||"")+'</span><b>'+esc(b.exercise||"")+'</b></div>'+(pr?'<div class="presc">'+esc(pr)+'</div>':'')+'</div>';}).join("");
    if(w.cooldown)parts+='<div class="block"><div class="bh"><span class="badge" style="background:#3a4a6b">CD</span><b>Cooldown</b></div><div class="presc">'+esc(w.cooldown)+'</div></div>';
    body='<div class="card" style="padding:16px;max-width:760px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><b>'+esc(w.title||"Workout")+'</b><span class="tag">vandaag</span></div>'+(w.coach_notes?'<div class="note" style="margin:0 0 10px">📝 '+esc(w.coach_notes)+'</div>':'')+(parts||'<div class="muted">Geen blokken.</div>')+'</div><p class="note">Scores invullen en video uploaden komt in de volgende stap (Fase 3).</p>';
  }else{body='<div class="card" style="padding:20px;max-width:760px"><div class="muted">Geen workout voor vandaag. Geniet van je rustdag! 💪</div></div>';}
  c.innerHTML=header("Welkom, "+(ME.profile.first_name||ME.user.email),"Jouw workout van vandaag")+body;
}

(async()=>{const{data:{session}}=await db.auth.getSession();if(session)await loadApp();else show("login");})();
</script>
