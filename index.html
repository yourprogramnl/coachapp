<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachApp</title>
<style>
:root{--bg:#0b0e13;--panel:#141923;--panel2:#1b212d;--line:#262e3b;--txt:#e7ebf2;--muted:#8a94a6;--accent:#4f8bff;--accent2:#2dd4a7;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 700px at 70% -10%,#15203a 0%,var(--bg) 55%);color:var(--txt);min-height:100vh}
.wrap{max-width:100%;margin:0 auto;padding:20px 26px 70px}
.logo{font-weight:800;font-size:22px;letter-spacing:1px}.logo b{color:var(--accent)}
.muted{color:var(--muted)} .hidden{display:none!important}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:16px}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.5;cursor:default}
input,select,textarea{width:100%;background:#0f141d;border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--txt);font-size:14px;font-family:inherit}
textarea{min-height:54px;resize:vertical}
label{font-size:13px;font-weight:600;color:var(--muted)}
.field{margin-bottom:13px}
#login{max-width:380px;margin:8vh auto 0}#login .card{padding:26px}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tabs button{flex:1;padding:9px;border-radius:9px;background:#0f141d;border:1px solid var(--line);color:var(--muted);font-weight:600;cursor:pointer;font-family:inherit}
.tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.msg{font-size:13px;margin-top:10px;min-height:18px}.msg.err{color:var(--bad)}.msg.ok{color:var(--ok)}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.rolepill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;background:rgba(79,139,255,.16);color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;background:linear-gradient(135deg,#3a4a6b,#2a3550);flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:15px}
.stat .n{font-size:24px;font-weight:800}.stat .n.acc{color:var(--accent)}.stat .n.ok{color:var(--ok)}
.stat .l{font-size:12px;color:var(--muted);margin-top:3px}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}.row.click{cursor:pointer}.row.click:hover{background:rgba(79,139,255,.06)}
.row .nm{font-weight:600;font-size:14px}.row .sub{font-size:12px;color:var(--muted)}
.tag{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--muted)}
h2{font-size:20px;margin-bottom:4px}h3{font-size:15px;margin:18px 0 10px}
.note{font-size:13px;color:var(--muted);line-height:1.5;margin-top:8px}
.back{font-size:13px;color:var(--accent);cursor:pointer;display:inline-block;margin-bottom:10px}
.block{background:#0f141d;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px}
.block .bh{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.badge{width:26px;height:26px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.presc{font-size:13px;color:var(--muted);margin-left:35px}
.x{cursor:pointer;color:var(--muted);text-align:center;font-size:18px}
.spin{color:var(--muted);font-size:13px;padding:20px;text-align:center}
.clientwrap{display:flex;gap:16px;align-items:flex-start}
.cside{width:212px;flex-shrink:0;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}
.cside .cinfo{display:flex;gap:10px;align-items:center;padding:4px 4px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
.cside .cinfo .nm{font-weight:700;font-size:14px}
.sidebtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:9px 10px;border-radius:9px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;font-family:inherit}
.sidebtn:hover{background:var(--panel);color:var(--txt)}
.sidebtn.on{background:rgba(79,139,255,.14);color:#fff}
.sidebtn .ic{width:18px;text-align:center}
.sidebtn .soon{margin-left:auto;font-size:9px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 5px}
.cmain{flex:1;min-width:0}
.calnav{display:flex;align-items:center;gap:10px;margin:4px 0 14px;flex-wrap:wrap}
.calnav .rng{font-weight:700;font-size:16px;min-width:150px}
.navbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:7px 12px;cursor:pointer;font-size:14px;font-family:inherit}
.calhead,.weekrow{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
.calhead{margin-bottom:6px}
.calhead div{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 6px}
.weekrow{margin-bottom:6px;align-items:start}
.daycell{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:8px;min-height:130px;display:flex;flex-direction:column}
.daycell.today{border-color:var(--accent)}
.daycell.dim{opacity:.45}
.daycell.editing{border-color:var(--accent);background:#101622}
.dnum{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--txt)}
.wo{background:#0f141d;border:1px solid var(--line);border-radius:9px;padding:7px;margin-bottom:6px}
.wo .t{font-weight:600;font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between;gap:6px}
.wo .bl{font-size:11px;color:var(--muted);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo .bl .bb{color:var(--accent);font-weight:700}
.addday{margin-top:auto;font-size:12px;color:var(--accent);cursor:pointer;text-align:center;padding:6px;border:1px dashed var(--line);border-radius:8px}
.addday:hover{background:rgba(79,139,255,.06)}
.delwo{color:var(--muted);cursor:pointer;font-size:13px}
/* inline builder in dagcel */
.inlineb .ibt{font-size:12px;font-weight:700;padding:7px;margin-bottom:5px}
.inlineb .ibs{font-size:11px;padding:6px 7px;margin-bottom:5px}
.exrow{background:#0b0e13;border:1px solid var(--line);border-radius:8px;padding:6px;margin-bottom:5px}
.exr-top2{display:flex;gap:4px;margin-bottom:4px}
.exr-top2 .lbl{width:30px;text-align:center;font-size:11px;padding:5px 2px}
.exr-top2 .exn{flex:1;font-size:11px;padding:5px 6px}
.exr-top2 .x{font-size:14px;padding:0 2px}
.exr-grid2{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.exr-grid2 input{font-size:11px;padding:5px 6px}
.f-desc{font-size:11px;padding:5px 6px;min-height:42px}
.ibrow{display:flex;gap:8px;align-items:center;margin:6px 0;flex-wrap:wrap}
.lnk{color:var(--accent);font-size:11px;cursor:pointer;font-weight:600}
@media(max-width:820px){.clientwrap{flex-direction:column}.cside{width:100%}.calhead,.weekrow{min-width:1100px}.calscroll{overflow-x:auto}}
</style>
</head>
<body>
<div class="wrap">

  <div id="login">
    <div style="text-align:center;margin-bottom:18px"><span class="logo">COACH<b>APP</b></span><div class="muted" style="font-size:13px;margin-top:4px">Coaching-platform · werkversie</div></div>
    <div class="card">
      <div class="tabs">
        <button id="tab-in" class="on" onclick="setMode('in')">Inloggen</button>
        <button id="tab-up" onclick="setMode('up')">Account maken</button>
      </div>
      <div class="field"><label>E-mailadres</label><input id="email" type="email" placeholder="naam@voorbeeld.nl"></div>
      <div class="field"><label>Wachtwoord</label><input id="pw" type="password" placeholder="••••••••"></div>
      <button class="btn" id="go" style="width:100%" onclick="submitAuth()">Inloggen</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <datalist id="exlist"></datalist>
    <div class="topbar">
      <span class="logo">COACH<b>APP</b></span>
      <span class="rolepill" id="roleLabel">…</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <div class="av" id="avatar">?</div>
        <button class="btn ghost sm" onclick="signOut()">Uitloggen</button>
      </div>
    </div>
    <div id="content"><div class="spin">Laden…</div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://ujuvbxqgnxkyjcmcrqpw.supabase.co";
const SUPABASE_KEY="sb_publishable_e_959eiOehMLgZzfZDFiuQ_2UVK-z_c";
let db=null;
try{
  if(typeof supabase==="undefined"||!supabase.createClient) throw new Error("lib");
  db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});
}catch(e){
  document.body.innerHTML='<div style="max-width:460px;margin:14vh auto;font-family:sans-serif;color:#e7ebf2;text-align:center;padding:24px"><h2 style="color:#4f8bff">Open in een gewone browser</h2><p style="color:#8a94a6;line-height:1.6">Deze app werkt niet in een klein voorbeeldvenster. Open de link in Chrome of Edge.</p></div>';
}
const ROLE_NL={platform_admin:"Platform-admin",eigenaar:"Eigenaar",coach:"Coach",lid:"Lid"};
const DAGEN=["MA","DI","WO","DO","VR","ZA","ZO"];
const MAANDVOL=["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const pad=n=>String(n).padStart(2,"0");
const ymd=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const todayStr=()=>ymd(new Date());
const mondayOf=d=>{const x=new Date(d);const k=(x.getDay()+6)%7;x.setDate(x.getDate()-k);x.setHours(0,0,0,0);return x;};
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
let ME={user:null,profile:null};

function composePresc(b){
  if(b.kind==="conditioning")return b.notes||"";
  const segs=[];const sr=[b.sets,b.reps].filter(Boolean).join(" x ");
  if(sr)segs.push(sr);if(b.tempo)segs.push("@ "+b.tempo);
  let s=segs.join(" ");if(b.rest)s+=(s?" · ":"")+"rust "+b.rest;return s;
}

let mode="in";
function setMode(m){mode=m;document.getElementById("tab-in").classList.toggle("on",m==="in");document.getElementById("tab-up").classList.toggle("on",m==="up");document.getElementById("go").textContent=m==="in"?"Inloggen":"Account maken";setMsg("");}
function setMsg(t,k){const e=document.getElementById("msg");e.textContent=t||"";e.className="msg "+(k||"");}
async function submitAuth(){
  const email=document.getElementById("email").value.trim(),pw=document.getElementById("pw").value;
  if(!email||!pw){setMsg("Vul e-mail en wachtwoord in.","err");return;}
  document.getElementById("go").disabled=true;
  try{
    if(mode==="in"){const{error}=await db.auth.signInWithPassword({email,password:pw});if(error)throw error;}
    else{const{error}=await db.auth.signUp({email,password:pw});if(error)throw error;setMsg("Account gemaakt. Mogelijk e-mail bevestigen, log daarna in.","ok");document.getElementById("go").disabled=false;setMode("in");return;}
    await loadApp();
  }catch(e){setMsg(e.message||"Er ging iets mis.","err");}
  document.getElementById("go").disabled=false;
}
function show(which){document.getElementById("login").classList.toggle("hidden",which!=="login");document.getElementById("app").classList.toggle("hidden",which!=="app");}
async function signOut(){await db.auth.signOut();document.getElementById("pw").value="";show("login");}

async function loadApp(){
  const{data:{user}}=await db.auth.getUser();
  if(!user){show("login");return;}
  const{data:profile}=await db.from("profiles").select("*").eq("id",user.id).single();
  ME={user,profile:profile||{role:"lid"}};
  const role=ME.profile.role||"lid";
  document.getElementById("roleLabel").textContent=ROLE_NL[role]||role;
  document.getElementById("avatar").textContent=(user.email||"?").slice(0,1).toUpperCase();
  show("app");
  if(role==="platform_admin")renderAdmin();
  else if(role==="eigenaar")renderEigenaar();
  else if(role==="coach")renderCoach();
  else renderLid();
}
function header(title,sub){return '<h2>'+esc(title)+'</h2>'+(sub?'<div class="muted">'+esc(sub)+'</div>':'');}
const naamVan=p=>esc([p.first_name,p.last_name].filter(Boolean).join(" ")||p.email);

async function renderAdmin(){
  const c=document.getElementById("content");c.innerHTML='<div class="spin">Laden…</div>';
  const{data:companies}=await db.from("companies").select("*").order("created_at");
  let rows=(companies||[]).map(co=>'<div class="row"><div class="av">'+esc(co.name.slice(0,2).toUpperCase())+'</div><div style="flex:1"><div class="nm">'+esc(co.name)+'</div><div class="sub">Plan: '+esc(co.plan)+'</div></div><span class="tag">'+esc(co.status)+'</span></div>').join("");
  c.innerHTML=header("Welkom, "+ME.user.email,"Platform-admin — bedrijven die het product gebruiken")+
    '<div class="stats"><div class="stat"><div class="n acc">'+(companies||[]).length+'</div><div class="l">Bedrijven</div></div></div>'+
    '<h3>Bedrijven</h3><div class="card">'+(rows||'<div class="row"><span class="muted">Nog geen bedrijven.</span></div>')+'</div>';
}
async function renderEigenaar(){
  const c=document.getElementById("content");c.innerHTML='<div class="spin">Laden…</div>';
  const{data:people}=await db.from("profiles").select("*").eq("company_id",ME.profile.company_id);
  const coaches=(people||[]).filter(p=>p.role==="coach"||p.role==="eigenaar");
  const leden=(people||[]).filter(p=>p.role==="lid");
  c.innerHTML=header("Eigenaar-overzicht","Alle coaches en leden van je bedrijf")+
    '<div class="stats"><div class="stat"><div class="n acc">'+coaches.length+'</div><div class="l">Coaches</div></div><div class="stat"><div class="n">'+leden.length+'</div><div class="l">Leden</div></div></div>'+
    '<h3>Coaches</h3><div class="card">'+(coaches.map(p=>'<div class="row"><div class="av">'+naamVan(p).slice(0,1)+'</div><div style="flex:1"><div class="nm">'+naamVan(p)+'</div><div class="sub">'+ROLE_NL[p.role]+'</div></div></div>').join("")||'<div class="row"><span class="muted">Nog geen coaches.</span></div>')+'</div>'+
    '<h3>Leden</h3><div class="card">'+(leden.map(p=>'<div class="row"><div class="av">'+naamVan(p).slice(0,1)+'</div><div style="flex:1"><div class="nm">'+naamVan(p)+'</div><div class="sub">'+esc(p.membership_type||"")+'</div></div></div>').join("")||'<div class="row"><span class="muted">Nog geen leden.</span></div>')+'</div>';
}

// ---------- COACH ----------
let coachClients=[],coachExercises=[];
async function renderCoach(){
  const c=document.getElementById("content");c.innerHTML='<div class="spin">Laden…</div>';
  const{data:clients}=await db.from("profiles").select("*").eq("coach_id",ME.user.id).eq("role","lid");
  coachClients=clients||[];
  const{data:exs}=await db.from("exercises").select("name").order("name");
  coachExercises=exs||[];
  const dl=document.getElementById("exlist");if(dl)dl.innerHTML=coachExercises.map(e=>'<option value="'+esc(e.name)+'">').join("");
  let rows=coachClients.map(p=>'<div class="row click" onclick="openClient(\''+p.id+'\')"><div class="av">'+naamVan(p).slice(0,1)+'</div><div style="flex:1"><div class="nm">'+naamVan(p)+'</div><div class="sub">'+esc(p.email)+'</div></div><span class="tag">programmeren ›</span></div>').join("");
  c.innerHTML=header("Welkom, "+(ME.profile.first_name||ME.user.email),"Coach-dashboard")+
    '<div class="stats"><div class="stat"><div class="n acc">'+coachClients.length+'</div><div class="l">Mijn klanten</div></div></div>'+
    '<h3>Mijn klanten</h3><div class="card">'+(rows||'<div class="row"><span class="muted">Nog geen klanten gekoppeld.</span></div>')+'</div>';
}

let calClient=null,calRef=new Date(),activePanel="kalender",editDay=null;
const SIDE=[["kalender","🗓","Kalender",false],["berichten","💬","Berichten",true],["assessment","📋","Assessment",true],["metrics","📊","Metrics / 1RM's",true],["doelen","🎯","Doelen",true],["checkins","✅","Check-ins",true],["lifestyle","🌙","Lifestyle",true],["notities","📝","Notities",true],["schema","🗂","Trainingsschema",true],["materiaal","🏋","Materiaal",true],["profiel","👤","Profiel",true]];
function openClient(id){calClient=id;calRef=new Date();editDay=null;renderClient("kalender");}
function renderClient(panel){
  activePanel=panel;
  const p=coachClients.find(x=>x.id===calClient);if(!p)return renderCoach();
  const side=SIDE.map(s=>'<button class="sidebtn'+(s[0]===panel?' on':'')+'" onclick="renderClient(\''+s[0]+'\')"><span class="ic">'+s[1]+'</span>'+s[2]+(s[3]?'<span class="soon">later</span>':'')+'</button>').join("");
  const c=document.getElementById("content");
  c.innerHTML='<span class="back" onclick="renderCoach()">‹ Terug naar klanten</span>'+
    '<div class="clientwrap"><div class="cside"><div class="cinfo"><div class="av">'+naamVan(p).slice(0,1)+'</div><div><div class="nm">'+naamVan(p)+'</div><div class="sub" style="font-size:11px">'+esc(p.email)+'</div></div></div>'+side+'</div>'+
    '<div class="cmain" id="cmain"><div class="spin">Laden…</div></div></div>';
  if(panel==="kalender")renderMonth();
  else{const lbl=(SIDE.find(s=>s[0]===panel)||[])[2]||"Onderdeel";document.getElementById("cmain").innerHTML='<h2>'+esc(lbl)+'</h2><div class="card" style="padding:24px;margin-top:10px"><div class="muted" style="line-height:1.6">Dit onderdeel komt later. We bouwen eerst de kalender en het programmeren helemaal af. Daarna voegen we '+esc(lbl.toLowerCase())+' toe — net als in CoachRx.</div></div>';}
}
function prevMonth(){editDay=null;calRef=new Date(calRef.getFullYear(),calRef.getMonth()-1,1);renderMonth();}
function nextMonth(){editDay=null;calRef=new Date(calRef.getFullYear(),calRef.getMonth()+1,1);renderMonth();}
function thisMonth(){editDay=null;calRef=new Date();renderMonth();}

function exRowHtml(label){return '<div class="exrow" data-kind="exercise"><div class="exr-top2"><input class="lbl" value="'+(label||"")+'" maxlength="3" placeholder="A"><input class="exn" list="exlist" placeholder="Oefening (typ om te zoeken)"><span class="x" onclick="this.closest(\'.exrow\').remove()">×</span></div><div class="exr-grid2"><input class="f-sets" placeholder="Sets"><input class="f-reps" placeholder="Reps"><input class="f-tempo" placeholder="Tempo"><input class="f-rest" placeholder="Rust"></div></div>';}
function condRowHtml(label){return '<div class="exrow" data-kind="conditioning"><div class="exr-top2"><input class="lbl" value="'+(label||"")+'" maxlength="3" placeholder="D"><input class="exn" placeholder="Titel (bv. 10 min AMRAP)"><span class="x" onclick="this.closest(\'.exrow\').remove()">×</span></div><textarea class="f-desc" placeholder="Beschrijving (bv. 200m roeien / 10 box step-ups / 8 burpees)"></textarea></div>';}
function addEx(){const n=document.querySelectorAll("#exrows .exrow").length;document.getElementById("exrows").insertAdjacentHTML("beforeend",exRowHtml(String.fromCharCode(65+n)));}
function addCond(){document.getElementById("exrows").insertAdjacentHTML("beforeend",condRowHtml(""));}
function inlineBuilderHtml(){
  return '<div class="inlineb">'+
    '<input id="w_title" class="ibt" placeholder="Titel van de dag">'+
    '<input id="w_warmup" class="ibs" placeholder="Warming-up (optioneel)">'+
    '<div id="exrows">'+exRowHtml("A")+exRowHtml("B")+'</div>'+
    '<div class="ibrow"><span class="lnk" onclick="addEx()">+ Exercise</span><span class="lnk" onclick="addCond()">+ Conditioning</span></div>'+
    '<input id="w_cooldown" class="ibs" placeholder="Cooldown (optioneel)">'+
    '<input id="w_notes" class="ibs" placeholder="Coach\'s notes (optioneel)">'+
    '<div class="ibrow"><button class="btn sm" id="saveW" onclick="saveWorkout()">Opslaan</button><button class="btn ghost sm" onclick="cancelEdit()">Annuleren</button></div>'+
    '<div class="msg" id="wmsg" style="font-size:11px;min-height:0"></div>'+
  '</div>';
}
function startEdit(ds){editDay=ds;renderMonth();}
function cancelEdit(){editDay=null;renderMonth();}

async function renderMonth(){
  const id=calClient;const m=document.getElementById("cmain");if(!m)return;m.innerHTML='<div class="spin">Laden…</div>';
  const ref=calRef,first=new Date(ref.getFullYear(),ref.getMonth(),1);
  const gridStart=mondayOf(first),gridEnd=addDays(gridStart,41);
  const{data:workouts}=await db.from("workouts").select("*, blocks(*)").eq("client_id",id).gte("workout_date",ymd(gridStart)).lte("workout_date",ymd(gridEnd)).order("workout_date");
  const byDate={};(workouts||[]).forEach(w=>{(byDate[w.workout_date]=byDate[w.workout_date]||[]).push(w);});
  let head=DAGEN.map(d=>'<div>'+d+'</div>').join(""),weeks="";
  for(let wk=0;wk<6;wk++){
    let cells="";
    for(let i=0;i<7;i++){
      const d=addDays(gridStart,wk*7+i),ds=ymd(d),isToday=ds===todayStr(),dim=d.getMonth()!==ref.getMonth(),editing=ds===editDay;
      const wos=(byDate[ds]||[]).map(w=>{
        const bl=(w.blocks||[]).sort((a,b)=>a.sort-b.sort).map(b=>'<div class="bl"><span class="bb">'+esc(b.label||"")+'</span> '+esc(b.exercise||"")+'</div>').join("");
        return '<div class="wo"><div class="t"><span>'+esc(w.title||"Workout")+'</span><span class="delwo" onclick="delWorkout(\''+w.id+'\')">×</span></div>'+(bl||'<div class="bl muted">geen blokken</div>')+'</div>';
      }).join("");
      const foot=editing?inlineBuilderHtml():'<div class="addday" onclick="startEdit(\''+ds+'\')">+ workout</div>';
      cells+='<div class="daycell'+(isToday?' today':'')+(dim?' dim':'')+(editing?' editing':'')+'"><div class="dnum">'+d.getDate()+'</div>'+wos+foot+'</div>';
    }
    weeks+='<div class="weekrow">'+cells+'</div>';
  }
  m.innerHTML='<div class="calnav"><span class="rng">'+MAANDVOL[ref.getMonth()]+' '+ref.getFullYear()+'</span><button class="navbtn" onclick="prevMonth()">‹</button><button class="navbtn" onclick="thisMonth()">Vandaag</button><button class="navbtn" onclick="nextMonth()">›</button></div>'+
    '<div class="calscroll"><div class="calhead">'+head+'</div>'+weeks+'</div>';
}
async function delWorkout(wid){if(!confirm("Deze workout verwijderen?"))return;await db.from("workouts").delete().eq("id",wid);renderMonth();}

async function saveWorkout(){
  const g=id=>document.getElementById(id);
  const title=g("w_title").value.trim();
  const rows=[...document.querySelectorAll("#exrows .exrow")].map((r,i)=>{
    const kind=r.dataset.kind,lbl=r.querySelector(".lbl").value.trim(),exn=r.querySelector(".exn").value.trim();
    if(kind==="conditioning")return{kind,label:lbl,exercise:exn,notes:(r.querySelector(".f-desc").value||"").trim(),sort:i+1};
    return{kind:"exercise",label:lbl,exercise:exn,tempo:r.querySelector(".f-tempo").value.trim(),reps:r.querySelector(".f-reps").value.trim(),sets:r.querySelector(".f-sets").value.trim(),rest:r.querySelector(".f-rest").value.trim(),sort:i+1};
  }).filter(b=>b.exercise);
  const wm=g("wmsg");
  if(!title){wm.textContent="Geef de workout een titel.";wm.className="msg err";return;}
  g("saveW").disabled=true;
  try{
    const{data:w,error}=await db.from("workouts").insert({company_id:ME.profile.company_id,coach_id:ME.user.id,client_id:calClient,workout_date:editDay,title,coach_notes:g("w_notes").value.trim()||null,warmup:g("w_warmup").value.trim()||null,cooldown:g("w_cooldown").value.trim()||null}).select().single();
    if(error)throw error;
    if(rows.length){const{error:be}=await db.from("blocks").insert(rows.map(b=>({workout_id:w.id,kind:b.kind,label:b.label,exercise:b.exercise,tempo:b.tempo||null,reps:b.reps||null,sets:b.sets||null,rest:b.rest||null,notes:b.notes||null,sort:b.sort})));if(be)throw be;}
    editDay=null;renderMonth();
  }catch(e){wm.textContent=e.message||"Opslaan mislukt.";wm.className="msg err";g("saveW").disabled=false;}
}

// ---------- LID ----------
async function renderLid(){
  const c=document.getElementById("content");c.innerHTML='<div class="spin">Laden…</div>';
  const{data:today}=await db.from("workouts").select("*, blocks(*)").eq("client_id",ME.user.id).eq("workout_date",todayStr());
  const w=(today||[])[0];let body;
  if(w){
    let parts="";
    if(w.warmup)parts+='<div class="block"><div class="bh"><span class="badge" style="background:#3a4a6b">WU</span><b>Warming-up</b></div><div class="presc">'+esc(w.warmup)+'</div></div>';
    parts+=(w.blocks||[]).sort((a,b)=>a.sort-b.sort).map(b=>{const pr=composePresc(b);return '<div class="block"><div class="bh"><span class="badge">'+esc(b.label||"")+'</span><b>'+esc(b.exercise||"")+'</b></div>'+(pr?'<div class="presc">'+esc(pr)+'</div>':'')+'</div>';}).join("");
    if(w.cooldown)parts+='<div class="block"><div class="bh"><span class="badge" style="background:#3a4a6b">CD</span><b>Cooldown</b></div><div class="presc">'+esc(w.cooldown)+'</div></div>';
    body='<div class="card" style="padding:16px;max-width:760px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><b>'+esc(w.title||"Workout")+'</b><span class="tag">vandaag</span></div>'+(w.coach_notes?'<div class="note" style="margin:0 0 10px">📝 '+esc(w.coach_notes)+'</div>':'')+(parts||'<div class="muted">Geen blokken.</div>')+'</div><p class="note">Scores invullen en video uploaden komt in de volgende stap (Fase 3).</p>';
  }else{body='<div class="card" style="padding:20px;max-width:760px"><div class="muted">Geen workout voor vandaag. Geniet van je rustdag! 💪</div></div>';}
  c.innerHTML=header("Welkom, "+(ME.profile.first_name||ME.user.email),"Jouw workout van vandaag")+body;
}

(async()=>{const{data:{session}}=await db.auth.getSession();if(session)await loadApp();else show("login");})();
</script>
