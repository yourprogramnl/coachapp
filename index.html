<script>
function header(title,sub){return '<h2>'+esc(title)+'</h2>'+(sub?'<div class="muted">'+esc(sub)+'</div>':'');}
const naamVan=p=>esc([p.first_name,p.last_name].filter(Boolean).join(" ")||p.email);

// ---------- KLANTEN-pagina (naar het ontwerp) ----------
let KDATA=null,klantPeriode=30,klantZoek="";
async function fillKlanten(){
  const ids=coachClients.map(p=>p.id);
  const td=todayStr(),from90=ymd(addDays(new Date(),-89)),plus14=ymd(addDays(new Date(),14));
  let ws=[],rs=[],msgs=[];
  if(ids.length){
    ws=(await db.from("workouts").select("id,client_id,workout_date,title").in("client_id",ids).gte("workout_date",from90).lte("workout_date",plus14).order("workout_date")).data||[];
    const wids=ws.map(w=>w.id);
    if(wids.length)rs=(await db.from("results").select("workout_id,status").in("workout_id",wids)).data||[];
    msgs=(await db.from("messages").select("athlete_id").in("athlete_id",ids).gte("created_at",ymd(mondayOf(new Date())))).data||[];
  }
  KDATA={ws:ws.filter(w=>!/^rest ?day$/i.test((w.title||"").trim())),done:new Set(rs.filter(r=>r.status==="completed").map(r=>r.workout_id)),msgs};
  klantenRender();
}
function klantWorkoutChip(p){
  const td=todayStr();
  const mijn=KDATA.ws.filter(w=>w.client_id===p.id);
  const up=mijn.filter(w=>w.workout_date>=td).sort((a,b)=>a.workout_date.localeCompare(b.workout_date))[0];
  if(up){
    const d=new Date(up.workout_date+"T00:00:00");
    const diff=Math.round((d-new Date(td+"T00:00:00"))/864e5);
    const lbl=diff===0?"vandaag":(diff<=6?DAGVOL[(d.getDay()+6)%7]:DAGEN[(d.getDay()+6)%7].toLowerCase()+" "+d.getDate()+" "+MAANDKORT[d.getMonth()]);
    return '<span class="wchip ok">'+esc(lbl)+'</span>';
  }
  const late=mijn.filter(w=>w.workout_date<td&&!KDATA.done.has(w.id)).sort((a,b)=>b.workout_date.localeCompare(a.workout_date))[0];
  if(late){const d=new Date(late.workout_date+"T00:00:00");return '<span class="wchip laat">'+DAGEN[(d.getDay()+6)%7].toLowerCase()+' '+d.getDate()+' '+MAANDKORT[d.getMonth()]+'</span>';}
  return '<span class="wchip leeg">geen gepland</span>';
}
function klantComp(list){
  const td=todayStr(),fromP=ymd(addDays(new Date(),-(klantPeriode-1)));
  const sched=KDATA.ws.filter(w=>w.workout_date>=fromP&&w.workout_date<=td&&list.some(c=>c.id===w.client_id));
  if(!sched.length)return null;
  return Math.round(sched.filter(w=>KDATA.done.has(w.id)).length/sched.length*100);
}
function klantRijen(){
  const zoek=klantZoek.toLowerCase();
  const lijst=coachClients.filter(p=>!zoek||naamVan(p).toLowerCase().includes(zoek)||(p.email||"").toLowerCase().includes(zoek)).sort((a,b)=>naamVan(a).localeCompare(naamVan(b)));
  return lijst.map(p=>{
    const wp=klantComp([p]);
    return '<div class="trow click" onclick="openClient(\''+p.id+'\')">'+
      '<div style="flex:2.2;display:flex;gap:11px;align-items:center"><div class="cavc" style="'+avStijl(naamVan(p))+'">'+esc(naamVan(p).slice(0,2).toUpperCase())+'</div><div><div style="font-weight:700;font-size:13px">'+naamVan(p)+'</div><div class="sm muted">Laatste consult: n.v.t.</div></div></div>'+
      '<div style="flex:1.2">'+klantWorkoutChip(p)+'</div>'+
      '<div style="flex:1.2"><span class="wchip leeg">niet ingesteld</span></div>'+
      '<div style="flex:1">'+(wp==null?'<span class="muted">–</span>':'<b style="color:'+(wp>=70?'#1d9a63':'#e5484d')+'">'+wp+'%</b>')+'</div>'+
      '<div style="flex:1.6" onclick="event.stopPropagation()"><button class="plusbtn" onclick="toast(\'Tags komen in een volgende stap\')">+</button></div>'+
      '<button class="kebab" onclick="event.stopPropagation();toast(\'Opties komen later\')">⋮</button></div>';
  }).join("");
}
function klantZoekF(v){klantZoek=v;const h=document.getElementById("klantrows");if(h)h.innerHTML=klantRijen()||'<div class="trow"><span class="muted">Geen klanten gevonden.</span></div>';}
function klantenRender(){
  const cp=document.getElementById("cpage");if(!cp||!KDATA)return;
  const msgIds=new Set(KDATA.msgs.map(m=>m.athlete_id));
  const totaal=klantComp(coachClients);
  const cmTot=coachClients.length?Math.round(coachClients.filter(p=>msgIds.has(p.id)).length/coachClients.length*100):null;
  cp.innerHTML='<div class="statbar2">'+
    '<div><div class="n">'+coachClients.length+'</div><div class="l">Actieve klanten</div></div>'+
    '<div><div class="n acc">'+(totaal==null?'–':totaal+'%')+'</div><div class="l">Compliance</div><div><select onchange="klantPeriode=parseInt(this.value);klantenRender()">'+[7,30,90].map(n=>'<option value="'+n+'"'+(klantPeriode===n?' selected':'')+'>Workout: '+n+' dagen</option>').join('')+'</select></div></div>'+
    '<div><div class="n">–</div><div class="l">Consult-rate</div></div>'+
    '<div><div class="n acc">'+(cmTot==null?'–':cmTot+'%')+'</div><div class="l">Contactmomenten</div></div></div>'+
    '<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">'+
      '<div class="search2"><svg class="i sm-i"><use href="#i-search"/></svg><input placeholder="Zoek op naam of tag…" value="'+esc(klantZoek)+'" oninput="klantZoekF(this.value)"></div>'+
      '<div style="margin-left:auto;display:flex;gap:8px"><button class="btn" onclick="openInvModal(\'lid\')">+ Klant toevoegen</button><button class="btn ghost" onclick="toast(\'Tags beheren komt in een volgende stap\')">Tags beheren</button><button class="btn ghost" onclick="exportKlanten()">Exporteren</button></div></div>'+
    '<div class="ctabs"><button class="on">Actief <span style="font-weight:600;color:#8a919c">'+coachClients.length+'</span></button><button onclick="toast(\'Archief komt in een volgende stap\')">Archief <span style="font-weight:600;color:#8a919c">0</span></button></div>'+
    '<div class="card"><div class="thead"><div style="flex:2.2">Naam</div><div style="flex:1.2">Workout</div><div style="flex:1.2">Lifestyle</div><div style="flex:1">Compliance</div><div style="flex:1.6">Tags</div><div style="width:30px"></div></div>'+
    '<div id="klantrows">'+(klantRijen()||'<div class="trow"><span class="muted">Nog geen klanten gekoppeld.</span></div>')+'</div></div>';
}
function exportKlanten(){
  const td=todayStr();
  const kop="Naam;E-mail;Volgende workout;Compliance ("+klantPeriode+" dagen)";
  const regels=coachClients.map(p=>{
    const wp=klantComp([p]);
    const up=KDATA.ws.filter(w=>w.client_id===p.id&&w.workout_date>=td).sort((a,b)=>a.workout_date.localeCompare(b.workout_date))[0];
    return [naamVan(p).replace(/;/g,","),p.email||"",up?up.workout_date:"-",wp==null?"-":wp+"%"].join(";");
  });
  const blob=new Blob(["﻿"+kop+"\n"+regels.join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="klanten.csv";a.click();URL.revokeObjectURL(a.href);
  toast("klanten.csv gedownload");
}
async function fillCoaches(){
  let q=db.from("profiles").select("*").in("role",["coach","eigenaar"]);
  if(ME.profile.company_id)q=q.eq("company_id",ME.profile.company_id);
  const{data:coaches}=await q;
  // Prestaties per coach: compliance (30 dagen) en contactmomenten (deze week) van zijn klanten
  const ids=coachClients.map(p=>p.id);
  const td=todayStr(),from30=ymd(addDays(new Date(),-29));
  let ws=[],rs=[],msgs=[];
  if(ids.length){
    ws=((await db.from("workouts").select("id,client_id,workout_date,title").in("client_id",ids).gte("workout_date",from30).lte("workout_date",td)).data||[]).filter(w=>!/^rest ?day$/i.test((w.title||"").trim()));
    const wids=ws.map(w=>w.id);
    if(wids.length)rs=(await db.from("results").select("workout_id,status").in("workout_id",wids)).data||[];
    msgs=(await db.from("messages").select("athlete_id").in("athlete_id",ids).gte("created_at",ymd(mondayOf(new Date())))).data||[];
  }
  const doneWo=new Set(rs.filter(r=>r.status==="completed").map(r=>r.workout_id));
  const gesprokenIds=new Set(msgs.map(m=>m.athlete_id));
  const compVan=list=>{const sched=ws.filter(w=>list.some(c=>c.id===w.client_id));if(!sched.length)return null;return Math.round(sched.filter(w=>doneWo.has(w.id)).length/sched.length*100);};
  const totaalComp=compVan(coachClients);
  const totaalCm=coachClients.length?Math.round(coachClients.filter(p=>gesprokenIds.has(p.id)).length/coachClients.length*100):null;
  const rows=(coaches||[]).sort((a,b)=>naamVan(a).localeCompare(naamVan(b))).map(c=>{
    const kl=coachClients.filter(k=>k.coach_id===c.id);
    const wp=compVan(kl);
    const cm=kl.length?Math.round(kl.filter(p=>gesprokenIds.has(p.id)).length/kl.length*100):null;
    const rol=c.role==="eigenaar"?'<span class="cpill purple">Eigenaar</span>':'<span class="cpill teal">Coach</span>';
    return '<div class="trow"><div style="flex:2.2;display:flex;gap:11px;align-items:center"><div class="cavc" style="'+avStijl(naamVan(c))+'">'+esc(naamVan(c).slice(0,2).toUpperCase())+'</div><div><div style="font-weight:700;font-size:13px">'+naamVan(c)+'</div><div class="sm muted">'+kl.length+' '+(kl.length===1?'klant':'klanten')+'</div></div></div>'+
      '<div style="flex:1">'+(wp==null?'<span class="muted">–</span>':'<b style="color:'+(wp>=70?'#1d9a63':'#e5484d')+'">'+wp+'%</b>')+'</div>'+
      '<div style="flex:1" class="muted">–</div>'+
      '<div style="flex:1.2">'+(cm==null?'<span class="muted">0%</span>':'<b style="color:'+(cm>=70?'#1d9a63':'#8a919c')+'">'+cm+'%</b>')+'</div>'+
      '<div style="flex:1">'+rol+'</div>'+
      '<button class="kebab" onclick="toast(\'Opties komen later\')">⋮</button></div>';
  }).join("");
  const cp=document.getElementById("cpage");
  if(!cp)return;
  cp.innerHTML='<div class="statbar2">'+
    '<div><div class="n">'+coachClients.length+'</div><div class="l">Klanten totaal</div></div>'+
    '<div><div class="n acc">'+(totaalComp==null?'–':totaalComp+'%')+'</div><div class="l">Compliance</div></div>'+
    '<div><div class="n">–</div><div class="l">Consult-rate</div></div>'+
    '<div><div class="n acc">'+(totaalCm==null?'–':totaalCm+'%')+'</div><div class="l">Contactmomenten</div></div></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h1 style="margin:0">Coaches</h1><button class="btn" onclick="openInvModal(\'coach\')">+ Coach toevoegen</button></div>'+
    '<div class="card"><div class="thead"><div style="flex:2.2">Naam</div><div style="flex:1">Workout %</div><div style="flex:1">Consult-rate</div><div style="flex:1.2">Contactmomenten</div><div style="flex:1">Rol</div><div style="width:30px"></div></div>'+
    (rows||'<div class="trow"><span class="muted">Nog geen coaches.</span></div>')+'</div>';
}
// ---------- Uitnodigen (klant of coach) via de invites-tabel ----------
let invRol="lid";
async function openInvModal(rol){
  ensureLibModals();invRol=rol;
  document.getElementById("inv-titel").textContent=rol==="coach"?"Coach toevoegen":"Klant toevoegen";
  document.getElementById("inv-coach-veld").style.display=rol==="coach"?"none":"";
  document.getElementById("inv-lid-veld").style.display=rol==="coach"?"none":"";
  ["inv-vn","inv-an","inv-email"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("inv-result").style.display="none";
  document.getElementById("inv-maak").style.display="";
  document.getElementById("inv-msg").textContent="";
  document.getElementById("invmodal").classList.add("show");
  if(rol!=="coach"){
    const{data:cs}=await db.from("profiles").select("id,first_name,last_name,email").in("role",["coach","eigenaar"]).eq("company_id",ME.profile.company_id);
    document.getElementById("inv-coach").innerHTML=(cs||[]).map(c=>'<option value="'+c.id+'"'+(c.id===ME.user.id?" selected":"")+'>'+naamVan(c)+'</option>').join("");
  }
}
async function invAanmaken(){
  const vn=document.getElementById("inv-vn").value.trim(),an=document.getElementById("inv-an").value.trim(),em=document.getElementById("inv-email").value.trim();
  const msg=document.getElementById("inv-msg");
  if(!em){msg.textContent="Vul een e-mailadres in.";return;}
  const rec={company_id:ME.profile.company_id,coach_id:invRol==="coach"?null:document.getElementById("inv-coach").value||null,email:em,first_name:vn||null,last_name:an||null,role:invRol,membership_type:invRol==="coach"?null:document.getElementById("inv-type").value,created_by:ME.user.id,expires_at:new Date(Date.now()+14*864e5).toISOString()};
  const{data,error}=await db.from("invites").insert(rec).select().single();
  if(error){msg.textContent=error.message||"Aanmaken mislukt";return;}
  document.getElementById("inv-link").value=location.origin+location.pathname+"?invite="+data.token;
  document.getElementById("inv-result").style.display="";
  document.getElementById("inv-maak").style.display="none";
  msg.textContent="";
}
function kopieerInvLink(){const i=document.getElementById("inv-link");i.select();navigator.clipboard.writeText(i.value).then(()=>toast("Link gekopieerd"),()=>toast("Kopiëren lukte niet, selecteer de link zelf"));}
async function fillCompanies(){
  const{data:companies}=await db.from("companies").select("*").order("created_at");
  const rows=(companies||[]).map(co=>'<div class="row"><div class="av">'+esc((co.name||"?").slice(0,2).toUpperCase())+'</div><div style="flex:1"><div class="nm">'+esc(co.name)+'</div><div class="sub">Plan: '+esc(co.plan)+'</div></div><span class="tag">'+esc(co.status)+'</span></div>').join("");
  const cp=document.getElementById("cpage");
  if(cp)cp.innerHTML='<h1>Bedrijven</h1><div class="card">'+(rows||'<div class="row"><span class="muted">Nog geen bedrijven.</span></div>')+'</div>';
}

// ---------- BIBLIOTHEEK (live uit oefeningen + templates) ----------
const TPLKLEUR={yellow:"#eab308",blue:"#3b82f6",purple:"#8b5cf6",red:"#ef4444",green:"#22c55e",orange:"#f97316",gray:"#9ca3af"};
const TPLKLEUREN=["yellow","blue","purple","red","green","orange"];
const LEGNAAM={yellow:"Conditie",blue:"Kracht",purple:"Gymnastics",red:"Intensief",green:"Herstel",orange:"Overig"};
const LIB_PER=50;
let LIB={oef:[],tpl:[],mode:"oef",zoek:"",pag:0,kleur:"",busy:false,geladen:false,editOef:null,editTpl:null,tplKleur:"yellow"};
const ytIdVan=u=>{const m=(u||"").match(/(?:youtu\.be\/|v=|shorts\/|embed\/)([A-Za-z0-9_-]{6,})/);return m?m[1]:null;};

function libShellHtml(){
  const nav=[["oef","Oefeningen"],["warmup","Warming-ups"],["workout","Workouts"],["cooldown","Cooldowns"]]
    .map(m=>'<button class="'+(LIB.mode===m[0]?"on":"")+'" onclick="libZetMode(\''+m[0]+'\')">'+m[1]+'</button>').join("");
  return '<h1>Bibliotheek</h1><div class="libgrid">'+

async function libLaad(){
  if(LIB.geladen||LIB.busy){libKop();return;}
  LIB.busy=true;
  let alles=[],from=0;
  while(true){
    const{data,error}=await db.from("oefeningen").select("id,naam,youtube_id,video_url,tags,bron").order("naam").range(from,from+999);
    if(error){LIB.busy=false;const h=document.getElementById("lib-lijst");if(h)h.innerHTML='<div class="cempty">Kon de bibliotheek niet laden. Probeer het opnieuw.</div>';return;}
    alles=alles.concat(data||[]);
    if(!data||data.length<1000)break;
    from+=1000;
  }
  const{data:tpl}=await db.from("templates").select("id,naam,instructies,type,kleur,tags,coach").order("naam");
  LIB.oef=alles;LIB.tpl=tpl||[];LIB.geladen=true;LIB.busy=false;
  libLijst();
}

function libLijst(){
  libKop();
  const host=document.getElementById("lib-lijst"),thead=document.getElementById("lib-thead"),pag=document.getElementById("lib-pag"),cnt=document.getElementById("lib-aantal");
  if(!host)return;
  if(!LIB.geladen){host.innerHTML='<div class="cempty">Bibliotheek laden…</div>';return;}
  if(LIB.mode!=="oef"){
    if(thead)thead.innerHTML='<div style="width:20px"></div><div style="flex:1.7">Naam</div><div style="flex:2.6">Instructies</div><div style="flex:1.2">Tags</div>';
    const type=LIB.mode==="warmup"?"warmup":(LIB.mode==="cooldown"?"cooldown":"other");
    const hits=LIB.tpl.filter(o=>o.type===type&&(!LIB.kleur||o.kleur===LIB.kleur)&&(!LIB.zoek||(o.naam||"").toLowerCase().includes(LIB.zoek)||(o.instructies||"").toLowerCase().includes(LIB.zoek)||(o.tags||[]).join(" ").toLowerCase().includes(LIB.zoek)));
    if(cnt)cnt.textContent=hits.length+" templates";
    host.innerHTML=hits.map(o=>{
      const tg=(o.tags||[]).slice(0,2).map(t=>'<span class="tag">'+esc(t)+'</span>').join(" ");
      return '<div class="trow" style="align-items:flex-start;cursor:pointer" onclick="tplBewerk('+o.id+')">'+
        '<div style="width:20px;padding-top:4px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+(TPLKLEUR[o.kleur]||TPLKLEUR.yellow)+'"></span></div>'+
        '<div style="flex:1.7"><b>'+esc(o.naam)+'</b></div>'+
        '<div style="flex:2.6" class="sm muted">'+esc(o.instructies||"").replace(/\n/g,"<br>")+'</div>'+
        '<div style="flex:1.2">'+tg+'</div></div>';
    }).join("")||'<div class="cempty">Geen templates gevonden.</div>';
    if(pag)pag.innerHTML="";
    return;
  }
  if(thead)thead.innerHTML='<div style="width:74px">Media</div><div style="flex:2.6">Oefening</div><div style="flex:1.6">Tags</div><div style="flex:.7">Van</div><div style="flex:.8">Video</div><div style="width:70px"></div>';
  if(cnt)cnt.textContent=LIB.oef.length+" video's";
  const hits=LIB.oef.filter(o=>!LIB.zoek||(o.naam||"").toLowerCase().includes(LIB.zoek)||(o.tags||[]).join(" ").toLowerCase().includes(LIB.zoek));
  const pages=Math.max(1,Math.ceil(hits.length/LIB_PER));
  if(LIB.pag>=pages)LIB.pag=pages-1;
  const deel=hits.slice(LIB.pag*LIB_PER,(LIB.pag+1)*LIB_PER);
  host.innerHTML=deel.map(o=>{
    const tags=(o.tags||[]).slice(0,3).map(t=>'<span class="tag">'+esc(t)+'</span>').join(" ");
    const thumb=o.youtube_id?'<img src="https://i.ytimg.com/vi/'+esc(o.youtube_id)+'/default.jpg" loading="lazy" style="width:64px;height:40px;object-fit:cover;border-radius:6px;display:block">':'<div style="width:64px;height:40px;border-radius:6px;background:#f4f4f5"></div>';
    const link=o.youtube_id?'<a class="cpill teal" href="https://youtu.be/'+esc(o.youtube_id)+'" target="_blank" rel="noopener" style="text-decoration:none" onclick="event.stopPropagation()">YouTube</a>':(o.video_url?'<a class="cpill teal" href="'+esc(o.video_url)+'" target="_blank" rel="noopener" style="text-decoration:none" onclick="event.stopPropagation()">video</a>':'<span class="cpill" style="background:#f4f4f5;color:#8a919c">geen</span>');
    const bron=o.bron==="coachrx"?"CRx":(o.bron&&o.bron!=="eigen"?String(o.bron).toUpperCase().slice(0,4):"");
    return '<div class="trow" style="cursor:pointer" onclick="oefBewerk('+o.id+')">'+
      '<div style="width:74px">'+thumb+'</div>'+
      '<div style="flex:2.6"><b>'+esc(o.naam)+'</b></div>'+
      '<div style="flex:1.6">'+tags+'</div>'+
      '<div style="flex:.7">'+(bron?'<span class="srcbadge">'+esc(bron)+'</span>':"")+'</div>'+
      '<div style="flex:.8">'+link+'</div>'+
      '<div style="width:70px"><button class="btn ghost sm">Bewerk</button></div></div>';
  }).join("")||'<div class="cempty">Geen oefeningen gevonden.</div>';
  if(!pag)return;
  if(pages<=1){pag.innerHTML="";return;}
  let kn='<button class="btn ghost sm" '+(LIB.pag===0?"disabled":'onclick="libGa('+(LIB.pag-1)+')"')+'>‹</button>';
  for(let p=0;p<pages;p++){
    if(p===0||p===pages-1||Math.abs(p-LIB.pag)<=2)kn+='<button class="btn sm '+(p===LIB.pag?"":"ghost")+'" onclick="libGa('+p+')">'+(p+1)+'</button>';
    else if((p===1&&LIB.pag>3)||(p===pages-2&&LIB.pag<pages-4))kn+='<span class="muted">…</span>';
  }
  kn+='<button class="btn ghost sm" '+(LIB.pag===pages-1?"disabled":'onclick="libGa('+(LIB.pag+1)+')"')+'>›</button>';
  pag.innerHTML=kn;
}

// Sessies, streak en workout-te-doen in de zijbalk, berekend uit echte data
async function vulKlantStats(p){
  const[wq,rq]=await Promise.all([
    db.from("workouts").select("id,workout_date,title").eq("client_id",p.id),
    db.from("results").select("workout_id,status").eq("athlete_id",p.id)
  ]);
  const ws=(wq.data||[]).filter(w=>!/^rest ?day$/i.test((w.title||"").trim()));
  const doneIds=new Set((rq.data||[]).filter(r=>r.status==="completed").map(r=>r.workout_id));
  const el=id=>document.getElementById(id);
  const sessies=ws.filter(w=>doneIds.has(w.id)).length;
  if(el("cs-sessies"))el("cs-sessies").textContent=sessies;
  if(el("cs-minisess")){el("cs-minisess").textContent=sessies;el("cs-minisess").title=sessies+" sessies afgerond";}
  // streak: aaneengesloten weken (t/m deze of vorige week) met minstens één voltooide workout
  const weekSet=new Set(ws.filter(w=>doneIds.has(w.id)).map(w=>ymd(mondayOf(new Date(w.workout_date+"T00:00:00")))));
  let wk=mondayOf(new Date()),streak=0;
  if(!weekSet.has(ymd(wk)))wk=addDays(wk,-7);
  while(weekSet.has(ymd(wk))){streak++;wk=addDays(wk,-7);}
  if(el("cs-streak"))el("cs-streak").textContent=streak+(streak===1?" week":" weken");
  // workout te doen deze week
  const td=todayStr(),mon=ymd(mondayOf(new Date())),sun=ymd(addDays(mondayOf(new Date()),6));
  const open=ws.filter(w=>w.workout_date>=mon&&w.workout_date<=sun&&!doneIds.has(w.id)).sort((a,b)=>a.workout_date.localeCompare(b.workout_date));
  if(open.length&&el("cs-pills")){
    const d=new Date(open[0].workout_date+"T00:00:00");
    const lbl=open[0].workout_date===td?"vandaag":DAGEN[(d.getDay()+6)%7].toLowerCase();
    el("cs-pills").insertAdjacentHTML("afterbegin",'<span class="cpill bad" style="font-size:10px;padding:2px 8px">workout te doen: '+esc(lbl)+'</span>');
  }
  // vaste trainingsdagen (laatste 4 weken), zoals "woensdag · zaterdag" in het ontwerp
  const von=ymd(addDays(new Date(),-27));
  const dagIdx=[...new Set(ws.filter(w=>w.workout_date>=von&&w.workout_date<=td).map(w=>{const d=new Date(w.workout_date+"T00:00:00");return (d.getDay()+6)%7;}))].sort((a,b)=>a-b);
  if(dagIdx.length&&el("cs-dagen")){el("cs-dagen-txt").textContent=dagIdx.map(i=>DAGVOL[i]).join(" · ");el("cs-dagen").style.display="";}
  // naam van de coach in de kalender-kop (cache zodat renderMonth hem niet overschrijft)
  if(p.coach_id&&myRole()!=="coach"){
    const{data:cp}=await db.from("profiles").select("first_name").eq("id",p.coach_id).single();
    if(cp){coachChipNaam=cp.first_name||"";const cc=el("cs-coach");if(cc)cc.textContent="Coach "+coachChipNaam;}
  }
}

function kalLabelUpdate(){
  // het label = de maand-sectie waarin de bovenste zichtbare rij valt
  const kop=document.querySelector("#calwrap .mhead7");
  // als de dagenbalk niet plakt (mobiel) geldt de bovenrand van het scherm
  const grens=Math.max(kop?kop.getBoundingClientRect().bottom+8:150,12);
  const zet=d=>{
    kalLabelMaand=new Date(d.getFullYear(),d.getMonth(),1);
    const lbl=document.getElementById("mnd-label");
    if(lbl){const t=MAANDVOL[d.getMonth()];lbl.textContent=t.charAt(0).toUpperCase()+t.slice(1)+" "+d.getFullYear();}
  };
  const vanLabel=el=>{const p=(el.dataset.manchor||"").split("-");if(p.length===3)zet(new Date(parseInt(p[1],10),parseInt(p[2],10),1));};
  let sectie=null; // laatste maandbalk die al boven de kop is doorgeschoven
  for(const el of document.querySelectorAll("#calwrap .mrow[data-d], #calwrap .mlabel")){
    const onderGrens=el.getBoundingClientRect().bottom>grens;
    if(el.classList.contains("mlabel")){
      if(!onderGrens){sectie=el;continue;}
      vanLabel(el);return; // maandbalk zelf bovenaan in beeld
    }
    if(!onderGrens)continue;
    if(sectie)vanLabel(sectie); // rij hoort bij de laatst gepasseerde maandbalk
    else zet(new Date(calRef.getFullYear(),calRef.getMonth(),1)); // vóór de eerste balk = startmaand
    return;
  }

function kalScrollBind(){

    kalLabelUpdate();

    if(Date.now()<kalAnim)return;

function kalGaNaarMaand(doel){
  const start=new Date(calRef.getFullYear(),calRef.getMonth(),1);
  if(doel<start){calRef=doel;kalWeken+=6;kalScrollDoel="top";renderMonth();return;}
  const key="m-"+doel.getFullYear()+"-"+doel.getMonth();
  const gridStart=mondayOf(start);
  const nodig=Math.ceil((mondayOf(doel)-gridStart)/(7*864e5))+8;
  if(kalWeken<nodig){kalWeken=nodig+4;kalScrollDoel=key;renderMonth();return;}
  kalScrollNaar(key);

async function mxOpslaan(){

  const{error}=await db.from("metrics").insert({athlete_id:calClient,company_id:ME.profile.company_id,metric:naam,value:waarde,unit:document.getElementById("mx-unit").value,measured_at:document.getElementById("mx-datum").value||todayStr(),created_by:ME.user.id});

function balKies(naam){balKeuze=naam;metricsRender();}
function metricsRender(){
  const m=document.getElementById("cmain");if(!m||activePanel!=="metrics")return;
  const rijen=(mxGroepen()["Resistance"]||[]).map(naam=>{
    const w=mxWaarde(naam);
    const act=naam===balKeuze;
    const val=w?'<span class="mv">'+esc(String(w.cur.value))+' '+esc(w.unit)+'</span>':'<span class="mv na">—</span>';
    return '<div class="metrow"'+(act?' style="background:#f0f8fc"':'')+' onclick="balKies(\''+naam.replace(/'/g,"\\'")+'\')"><span>'+(act?'<b>'+esc(naam)+'</b>':esc(naam))+'</span>'+val+'</div>';
  }).join("");
  const w=mxWaarde(balKeuze);
  let waarde="—",delta="",spark="";
  if(w){
    waarde=w.cur.value+" "+(w.unit||"");
    if(w.vorig&&w.vorig.value!=null&&w.vorig.value!==w.cur.value){
      const d=Math.round((w.cur.value-w.vorig.value)*10)/10;
      delta=(d>0?"+":"")+d+" "+(w.unit||"")+" sinds vorige meting";
    }
    const hist=mxHist(balKeuze).slice(-6);
    const max=Math.max(...hist.map(h=>h.value||0),1);
    spark=hist.map((h,i)=>'<i'+(i===hist.length-1?' class="hi"':'')+' style="height:'+Math.max(6,Math.round((h.value||0)/max*100))+'%" title="'+esc(h.measured_at)+': '+esc(String(h.value))+'"></i>').join("");
  }
  m.innerHTML='<div class="calhead"><span class="month">Metrics & 1RM</span>'+
    '<div class="seg" style="margin-left:auto"><button onclick="toast(\'Dag/week/maand-trends komen later\')">Dag</button><button class="on">Week</button><button onclick="toast(\'Dag/week/maand-trends komen later\')">Maand</button></div>'+
    '<button class="btn ghost sm" onclick="toast(\'Aanpassen komt later\')"><svg class="i sm-i"><use href="#i-gear"/></svg> Aanpassen</button></div>'+
    '<div class="metgrid"><div class="metlist">'+
    '<div class="mlh"><b class="sm">Krachtwaarden</b><button class="btn sm" onclick="openMxModal(\'\')">+ Voeg toe</button></div>'+
    '<div style="padding:10px 15px;border-bottom:1px solid #f0f1f3"><button class="btn ghost sm" style="width:100%;justify-content:center" onclick="openMx()">Metrics-paneel openen</button></div>'+
    '<div class="grp"><span>Naam</span><span>Huidig</span></div>'+
    '<div id="bal-lijst">'+rijen+'</div></div>'+
    '<div class="metmain"><div class="metcards">'+
    '<div class="metcard" style="grid-column:span 2"><h3>'+esc(balKeuze)+' <span class="muted sm" style="font-weight:400">· laatste 6 metingen</span></h3>'+
    '<div class="val">'+esc(waarde)+' <span class="delta">'+esc(delta)+'</span></div>'+
    (spark?'<div class="spark">'+spark+'</div>':'<div class="nodata" style="border:1px dashed #e7e9ec;border-radius:8px;color:#b3b9c2;font-size:11.5px;text-align:center;padding:14px 6px;margin-top:10px">Nog geen metingen. Voeg de eerste toe via + Voeg toe.</div>')+'</div>'+
    '<div class="metcard"><h3>Readiness</h3><div class="nodata">Nog geen data</div></div>'+
    '<div class="metcard"><h3>Slaap</h3><div class="nodata">Nog geen data</div></div>'+
    '<div class="metcard"><h3>Herstel</h3><div class="nodata">Nog geen data</div></div>'+

}

const GENDEROPTS=[["man","Man"],["vrouw","Vrouw"],["anders","Anders"]];
function leeftijdVan(bd){
  if(!bd)return null;
  const d=new Date(bd+"T00:00:00"),t=new Date();
  let age=t.getFullYear()-d.getFullYear();
  const m=t.getMonth()-d.getMonth();
  if(m<0||(m===0&&t.getDate()<d.getDate()))age--;
  return age>=0?age:null;
}
function profielRegel(p){
  const parts=[];
  const lft=leeftijdVan(p.birth_date);
  if(lft!=null)parts.push(lft+" jaar");
  if(p.weight_kg)parts.push(p.weight_kg+" kg");
  if(p.height_cm)parts.push(p.height_cm+" cm");
  return parts.join(" · ");
}

// Blokkleuren zoals het ontwerp: 6 legendakleuren met slimme standaard per oefening
function kleurVoorOefening(naam){
  const n=String(naam||"").toLowerCase();
  let b=null;(LIB.oef||[]).forEach(o=>{if(!b&&(o.naam||"").toLowerCase()===n)b=o;});
  const t=n+" "+(b?(b.tags||[]).join(" "):"");
  if(/stretch|mobilit|breath|adem|foam|cool.?down|pigeon|cars\b|herstel/.test(t))return "green";
  if(/muscle.?up|handstand|hspu|ring|toes to bar|t2b|rope climb|lever|planche|gymnast/.test(t))return "purple";
  if(/bike|erg\b|\brun|ski\b|amrap|interval|metcon|burpee|double.?under|sprint|conditioning|for time|emom|wod/.test(t))return "yellow";
  if(/squat|deadlift|press|bench|pull.?up|chin.?up|row|curl|lunge|rdl|hip thrust|clean|snatch|jerk|carry|dip\b|raise|extension|swing|thruster|barbell|dumbbell|kettlebell|kracht/.test(t))return "blue";
  return "orange";
}

function relabel(){
  const host=document.getElementById("exrows");if(!host)return;
  host.querySelectorAll(".sslink").forEach(x=>x.remove());
  const rows=[...host.querySelectorAll(".exrow")];if(!rows.length)return;
  rows[0].dataset.linked="0";rows[0].classList.remove("linked");
  let groups=[];
  rows.forEach((r,i)=>{if(i>0&&r.dataset.linked==="1"){groups[groups.length-1].push(r);}else{groups.push([r]);}});
  groups.forEach((g,gi)=>{const L=String.fromCharCode(65+gi);g.forEach((r,pos)=>{const bd=r.querySelector(".lbl-badge");if(bd)bd.textContent=g.length>1?L+(pos+1):L;});});
  // superset-cirkels tussen de blokken (zoals het ontwerp)
  rows.forEach((r,i)=>{
    if(i===rows.length-1)return;
    const d=document.createElement("div");
    d.className="sslink"+(rows[i+1].dataset.linked==="1"?" aan":"");
    d.title="Koppel als superset";
    d.innerHTML='<svg class="i sm-i"><use href="#i-link"/></svg>';
    d.onclick=ev=>{ev.stopPropagation();const nxt=rows[i+1];const on=nxt.dataset.linked!=="1";nxt.dataset.linked=on?"1":"0";nxt.classList.toggle("linked",on);relabel();};
    r.parentNode.insertBefore(d,rows[i+1]);
  });
}

let monthResults={},monthByDate={};
function mcardHtml(w){
  const blocks=(w.blocks||[]).slice().sort((a,b)=>a.sort-b.sort);
  if(!blocks.length&&/^rest ?day$/i.test((w.title||"").trim())){
    return '<div class="mcard planned" onclick="editWorkout(\''+w.id+'\',0)">'+
      '<div class="msc"><span style="color:#27b376">Rest Day</span><span class="delx" onclick="event.stopPropagation();delWorkout(\''+w.id+'\')">×</span></div>'+
      '<div class="cblk"><div class="pr" style="color:#8a919c">No instructions</div></div>'+
      '<button class="combtn" onclick="event.stopPropagation();toast(\'Comments komen in een volgende stap\')"><svg class="i sm-i"><use href="#i-chat"/></svg> Comments</button></div>';
  }
  let done=0,total=0,inner="";
  if(w.warmup)inner+='<div class="cblk k-grijs"><div class="n">Warmup</div><div class="pr">'+esc(w.warmup)+'</div></div>';
  blocks.forEach(b=>{
    total++;
    const r=monthResults[b.id];
    if(r&&r.status==="completed")done++;
    const kleur=b.color?' k-'+esc(b.color):'';
    const lk=b.linked?' linked2':'';
    const pr=composePresc(b);
    const sc=resultScoreTxt(r);
    inner+='<div class="cblk'+kleur+lk+'"><div class="n">'+esc(b.label||"")+') '+esc(b.exercise||"")+'</div>'+
      (pr?'<div class="pr">'+esc(pr)+'</div>':'')+
      (sc?'<div class="loginp">'+esc(sc)+'</div>':'')+
      (r?'<span class="okc'+(r.status==="missed"?' miss':'')+'"><svg class="i"><use href="#'+(r.status==="missed"?'i-x':'i-check')+'"/></svg></span>':'')+
      '</div>';
  });
  if(w.cooldown)inner+='<div class="cblk k-grijs"><div class="n">Cooldown</div><div class="pr">'+esc(w.cooldown)+'</div></div>';
  return '<div class="mcard'+(done===0?' planned':'')+'" onclick="editWorkout(\''+w.id+'\',0)">'+
    '<div class="msc"><span>'+done+'/'+total+' · '+esc(w.title||"Workout")+'</span><span class="delx" onclick="event.stopPropagation();delWorkout(\''+w.id+'\')">×</span></div>'+inner+
    '<button class="combtn" onclick="event.stopPropagation();toast(\'Comments komen in een volgende stap\')"><svg class="i sm-i"><use href="#i-chat"/></svg> Comments</button></div>';
}
async function renderMonth(){
  const id=calClient;const m=document.getElementById("cmain");if(!m)return;m.innerHTML='<div class="spin">Laden…</div>';

  const ref=calRef;
  // Weergave bepaalt het bereik: maand = 6 weken, week = 7 dagen, dag = 1 dag

  if(calView==="maand"){gridStart=mondayOf(new Date(ref.getFullYear(),ref.getMonth(),1));cellCount=kalWeken*7;cols=7;if(kalScrollDoel==null&&prevScrollY==null)prevScrollY=window.scrollY;}
  else if(calView==="week"){gridStart=mondayOf(ref);cellCount=7;cols=7;}
  else{gridStart=new Date(ref);gridStart.setHours(0,0,0,0);cellCount=1;cols=1;}
  const gridEnd=addDays(gridStart,cellCount-1);
  const{data:workouts}=await db.from("workouts").select("*, blocks(*)").eq("client_id",id).gte("workout_date",ymd(gridStart)).lte("workout_date",ymd(gridEnd)).order("workout_date");
  monthWorkouts={};monthByDate={};const byDate=monthByDate;(workouts||[]).forEach(w=>{monthWorkouts[w.id]=w;(byDate[w.workout_date]=byDate[w.workout_date]||[]).push(w);});

  monthResults={};
  const wids=(workouts||[]).map(w=>w.id);
  if(wids.length){
    const{data:res}=await db.from("results").select("*").eq("athlete_id",id).in("workout_id",wids);
    (res||[]).forEach(r=>{monthResults[r.block_id]=r;});
  }
  const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
  let label;
  if(calView==="maand"){const basis=kalLabelMaand||ref;label=cap(MAANDVOL[basis.getMonth()])+" "+basis.getFullYear();}
  else if(calView==="week")label=gridStart.getDate()+" "+MAANDKORT[gridStart.getMonth()]+" – "+gridEnd.getDate()+" "+MAANDKORT[gridEnd.getMonth()]+" "+gridEnd.getFullYear();
  else label=cap(DAGVOL[(gridStart.getDay()+6)%7])+" "+gridStart.getDate()+" "+MAANDKORT[gridStart.getMonth()]+" "+gridStart.getFullYear();
  const seg=[["dag","Dag"],["week","Week"],["maand","Maand"]].map(v=>'<button class="'+(calView===v[0]?"on":"")+'" onclick="kalSetView(\''+v[0]+'\')">'+v[1]+'</button>').join("");
  const calhead='<div class="calhead">'+
    '<button class="btn ghost sm" onclick="renderCoach(\'clients\')">‹ Alle klanten</button>'+
    '<span class="month" id="mnd-label">'+label+'</span>'+
    '<div class="navarrows"><button onclick="prevMonth()">‹</button><button onclick="nextMonth()">›</button></div>'+
    '<button class="btn ghost sm" onclick="thisMonth()">Vandaag</button>'+
    '<div class="seg">'+seg+'</div>'+
    '<div class="progsel" style="margin-left:auto" onclick="toast(\'Programma-weergaven (team/templates) komen later\')"><div class="pav" style="background:linear-gradient(135deg,#171719,#3a3f47)">'+esc((myRole()==="coach"?(ME.profile.first_name||"C"):(coachChipNaam||"C")).slice(0,1).toUpperCase())+'</div><div><div class="pn" id="cs-coach">Coach '+esc(myRole()==="coach"?(ME.profile.first_name||""):coachChipNaam)+'</div><div class="pt">1:1</div></div><span class="car">▾</span></div>'+
    '<div class="progsel" id="klantsel" onclick="toggleKlantDrop(event)"><div class="pav" style="'+avStijl(naamVan(p))+'">'+esc(naamVan(p).slice(0,2).toUpperCase())+'</div><div><div class="pn">'+naamVan(p)+'</div><div class="pt">Klant'+(coachChipNaam||myRole()==="coach"?' · '+esc(myRole()==="coach"?(ME.profile.first_name||""):coachChipNaam)+' ('+coachClients.filter(k=>k.coach_id===p.coach_id).length+')':'')+'</div></div><span class="car">▾</span>'+
      '<div class="progdrop" id="klantdrop" onclick="event.stopPropagation()"><div class="pd-search"><svg class="i sm-i"><use href="#i-search"/></svg><input placeholder="Zoek een klant…" oninput="filterKlantDrop(this.value)"></div><div class="pd-lijst" id="kd-lijst">'+
      coachClients.slice().sort((a,b)=>naamVan(a).localeCompare(naamVan(b))).map(k=>'<div class="pd-row'+(k.id===p.id?' actief':'')+'" data-n="'+esc(naamVan(k).toLowerCase())+'" onclick="openClient(\''+k.id+'\')"><div class="pd-badge" style="'+avStijl(naamVan(k))+'">'+esc(naamVan(k).slice(0,2).toUpperCase())+'</div><div class="pd-naam">'+naamVan(k)+'</div><span class="pd-vink"><svg class="i sm-i"><use href="#i-check"/></svg></span></div>').join("")+
      '</div></div></div>'+
    '<div class="seg"><button class="on">Workouts</button><button onclick="toast(\'Lifestyle komt later\')">Lifestyle</button></div>'+
    '<button class="tgl'+(hideScores?" on":"")+'" onclick="toggleScores(this)"><span class="sw"></span> Zonder scores</button>'+
    '<button class="btn ghost sm" title="Print of bewaar als PDF" onclick="window.print()"><svg class="i sm-i"><use href="#i-dl"/></svg> Export PDF</button>'+
    '</div>';
  const headDays=calView==="dag"?[DAGEN[(gridStart.getDay()+6)%7]]:DAGEN;
  const head=headDays.map(d=>'<div>'+d+'</div>').join("");
  const gridStyle=cols===1?' style="grid-template-columns:1fr"':'';
  let weeks="";
  for(let wk=0;wk<cellCount/cols;wk++){

    for(let i=0;i<cols;i++){
      const d=addDays(gridStart,wk*cols+i),ds=ymd(d),isToday=ds===todayStr(),dim=calView==="maand"&&d.getMonth()!==ref.getMonth(),editing=ds===editDay;
      const dayWos=byDate[ds]||[];
      const dnum=(d.getDate()===1?MAANDKORT[d.getMonth()]+" ":"")+d.getDate();

      let selectable=false;
      if(editing){
        inner+=dayWos.filter(w=>w.id!==editWid).map(mcardHtml).join("");
        inner+='<div class="ib2" onclick="event.stopPropagation()">'+inlineBuilderHtml(editWid?monthWorkouts[editWid]:null)+'</div>';
      }else if(dayWos.length){
        inner+='<div class="addrow2"><button class="addnewbtn" onclick="openDayMenu(event,\''+ds+'\')">+ Add New</button><button class="sqbtn" title="Kopieer de workout van deze dag" onclick="event.stopPropagation();kopieerDag(\''+ds+'\')"><svg class="i sm-i"><use href="#i-copy"/></svg></button></div>';
        inner+=dayWos.map(mcardHtml).join("");
      }else{
        selectable=true; // lege dag: aanwijzen of klikken opent het dag-menu
      }
      cells+='<div class="mday'+(selectable?' selectable':'')+(calView!=="maand"?" tall":"")+(isToday?' today-cell':'')+(dim?' dim2':'')+'"'+(selectable?' onclick="openDayMenu(event,\''+ds+'\')" onmouseenter="openDayMenu(event,\''+ds+'\')" onmouseleave="dagLeave(this)"':'')+'>'+inner+'</div>';
    }
    // maand-scheidingsbalk vóór de week waarin een nieuwe maand begint (zoals CoachRx)
    if(calView==="maand"&&wk>0){
      const wkStart=addDays(gridStart,wk*cols);
      for(let i=0;i<7;i++){
        const dd=addDays(wkStart,i);
        if(dd.getDate()===1){
          const t=MAANDVOL[dd.getMonth()];
          weeks+='<div class="mlabel" data-manchor="m-'+dd.getFullYear()+'-'+dd.getMonth()+'">'+t.charAt(0).toUpperCase()+t.slice(1)+' '+dd.getFullYear()+'</div>';
          break;
        }
      }
    }
    weeks+='<div class="mrow" data-d="'+ymd(addDays(gridStart,wk*cols))+'"'+gridStyle+'>'+cells+'</div>';
  }
  m.innerHTML=calhead+'<div class="calscroll'+(hideScores?" noscores":"")+'" id="calwrap"><div class="mhead7"'+gridStyle+'>'+head+'</div>'+weeks+'</div>';
  if(editDay){relabel();groei();}
  if(calView==="maand"){
    kalScrollBind();
    // dagenbalk plakt onder de (variabele) kalenderkop
    const ch=m.querySelector(".calhead"),pg=document.getElementById("cpage");
    if(ch&&pg)pg.style.setProperty("--calh",Math.round(ch.getBoundingClientRect().height)+"px");
    if(kalScrollDoel){const doel=kalScrollDoel;kalScrollDoel=null;prevScrollY=null;requestAnimationFrame(()=>{kalScrollNaar(doel,true);setTimeout(kalLabelUpdate,80);});}
    else if(prevScrollY!=null){const y=prevScrollY;prevScrollY=null;window.scrollTo(0,y);kalLabelUpdate();}
  }
}

  const w=insBlog.find(x=>x.id===id);if(!w)return;
  const blocks=(w.blocks||[]).slice().sort((a,b)=>a.sort-b.sort);
  if(insDoel==="bouwer"){
    const txt=blocks.map(b=>(b.label?b.label+") ":"")+(b.exercise||"")+(b.prescription?"\n"+b.prescription:"")).join("\n\n");
    const host=document.getElementById("exrows");
    if(host){host.insertAdjacentHTML("beforeend",exRow({exercise:w.title,prescription:txt,color:"blue"}));relabel();groei();}
    closeIns();toast("Weekworkout als blok toegevoegd");return;
  }
  const{data:nw,error}=await db.from("workouts").insert({company_id:ME.profile.company_id,coach_id:ME.user.id,client_id:calClient,workout_date:curDay,title:w.title,warmup:w.warmup,cooldown:w.cooldown}).select().single();
  if(error){toast(error.message||"Invoegen mislukt");return;}
  if(blocks.length){
    const{error:be}=await db.from("blocks").insert(blocks.map(b=>({workout_id:nw.id,kind:b.kind,label:b.label,linked:b.linked,exercise:b.exercise,prescription:b.prescription,notes:b.notes,sort:b.sort,color:b.color,score_type:b.score_type,oefening_id:b.oefening_id})));
    if(be){toast(be.message);return;}
  }
  closeIns();toast("Weekworkout ingevoegd; het gedeelde leaderboard koppelen we in een volgende stap");renderMonth();
}

async function saveWorkout(){
  const g=id=>document.getElementById(id);
  const title=g("w_title").value.trim();
  const rows=[...document.querySelectorAll("#exrows .exrow")].map((r,i)=>{const o=rowToObj(r);o.label=r.querySelector(".lbl-badge").textContent;o.sort=i+1;return o;}).filter(b=>b.exercise);
  const wm=g("wmsg");
  if(!title){wm.textContent="Geef de workout een titel.";wm.className="msg err";return;}
  g("saveW").disabled=true;
  const wf={title,coach_notes:g("w_notes").value.trim()||null,warmup:g("w_warmup").value.trim()||null,cooldown:g("w_cooldown").value.trim()||null};
  const mkBlocks=wid=>rows.map(b=>({workout_id:wid,kind:b.kind,label:b.label,linked:!!b.linked,exercise:b.exercise,prescription:b.prescription||null,notes:b.notes||null,sort:b.sort,color:b.color||null,score_type:b.score_type||"text",oefening_id:b.oefening_id||null}));
  try{
    if(editWid){
      const{error:ue}=await db.from("workouts").update(wf).eq("id",editWid);if(ue)throw ue;
      await db.from("blocks").delete().eq("workout_id",editWid);
      if(rows.length){const{error:be}=await db.from("blocks").insert(mkBlocks(editWid));if(be)throw be;}
    }else{
      const{data:w,error}=await db.from("workouts").insert(Object.assign({company_id:ME.profile.company_id,coach_id:ME.user.id,client_id:calClient,workout_date:editDay},wf)).select().single();
      if(error)throw error;
      if(rows.length){const{error:be}=await db.from("blocks").insert(mkBlocks(w.id));if(be)throw be;}
    }
    editWid=null;editDay=null;renderMonth();
  }catch(e){wm.textContent=e.message||"Opslaan mislukt.";wm.className="msg err";g("saveW").disabled=false;}
}

// ---------- LID ----------
async function renderLid(){
  document.body.classList.remove("coachmode");
  const c=document.getElementById("content");c.innerHTML='<div class="spin">Laden…</div>';
  const{data:today}=await db.from("workouts").select("*, blocks(*)").eq("client_id",ME.user.id).eq("workout_date",todayStr());
  const w=(today||[])[0];let body;
  if(w){
    let parts="";
    if(w.warmup)parts+='<div class="block"><div class="bh"><span class="badge" style="background:#3a4a6b">WU</span><b>Warming-up</b></div><div class="presc">'+esc(w.warmup)+'</div></div>';
    parts+=(w.blocks||[]).slice().sort((a,b)=>a.sort-b.sort).map(b=>{const pr=composePresc(b);return '<div class="block"><div class="bh"><span class="badge">'+esc(b.label||"")+'</span><b>'+esc(b.exercise||"")+'</b></div>'+(pr?'<div class="presc">'+esc(pr)+'</div>':'')+'</div>';}).join("");
    if(w.cooldown)parts+='<div class="block"><div class="bh"><span class="badge" style="background:#3a4a6b">CD</span><b>Cooldown</b></div><div class="presc">'+esc(w.cooldown)+'</div></div>';
    body='<div class="card" style="padding:16px;max-width:760px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><b>'+esc(w.title||"Workout")+'</b><span class="tag">vandaag</span></div>'+(w.coach_notes?'<div class="note" style="margin:0 0 10px">📝 '+esc(w.coach_notes)+'</div>':'')+(parts||'<div class="muted">Geen blokken.</div>')+'</div><p class="note">Scores invullen en video uploaden komt in de volgende stap (Fase 3).</p>';
  }else{body='<div class="card" style="padding:20px;max-width:760px"><div class="muted">Geen workout voor vandaag. Geniet van je rustdag! 💪</div></div>';}
  c.innerHTML=header("Welkom, "+(ME.profile.first_name||ME.user.email),"Jouw workout van vandaag")+body;
}

(async()=>{const{data:{session}}=await db.auth.getSession();if(session)await loadApp();else show("login");})();
