<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachApp</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-chat" viewBox="0 0 16 16"><path d="M2.5 3h11v8h-6l-3 2.5V11h-2z"/></symbol>
  <symbol id="i-cal" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M2 6.5h12M5.5 1.8v2.4M10.5 1.8v2.4"/></symbol>
  <symbol id="i-chart" viewBox="0 0 16 16"><path d="M3 13V8M8 13V3.5M13 13V6"/></symbol>
  <symbol id="i-target" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5"/><circle cx="8" cy="8" r="1.6"/></symbol>
  <symbol id="i-check" viewBox="0 0 16 16"><path d="M3 8.6 6.4 12 13 4.5"/></symbol>
  <symbol id="i-clip" viewBox="0 0 16 16"><rect x="3.5" y="3" width="9" height="11.2" rx="1.4"/><path d="M6 2.5h4M6 7h4.5M6 9.6h4.5"/></symbol>
  <symbol id="i-doc" viewBox="0 0 16 16"><path d="M4 1.8h5.2L12.5 5v9.2H4z"/><path d="M9 2v3.2h3.4"/></symbol>
  <symbol id="i-clock" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.8"/><path d="M8 5v3.4l2.2 1.4"/></symbol>
  <symbol id="i-gear" viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.4"/><path d="M8 1.8v2M8 12.2v2M1.8 8h2M12.2 8h2M3.6 3.6l1.4 1.4M11 11l1.4 1.4M12.4 3.6 11 5M5 11l-1.4 1.4"/></symbol>
  <symbol id="i-user" viewBox="0 0 16 16"><circle cx="8" cy="5.5" r="2.6"/><path d="M2.8 13.6a5.3 5.3 0 0 1 10.4 0"/></symbol>
  <symbol id="i-link" viewBox="0 0 16 16"><path d="M6.5 9.5 9.5 6.5"/><path d="M7.3 4.6 8.9 3a2.6 2.6 0 0 1 3.7 3.7l-1.6 1.6M8.7 11.4 7.1 13a2.6 2.6 0 0 1-3.7-3.7l1.6-1.6"/></symbol>
  <symbol id="i-copy" viewBox="0 0 16 16"><rect x="5.4" y="5.4" width="8" height="8.4" rx="1.4"/><path d="M10.6 3H4a1.5 1.5 0 0 0-1.5 1.5V11"/></symbol>
  <symbol id="i-dl" viewBox="0 0 16 16"><path d="M8 2.5v7.5M8 10 5.4 7.4M8 10l2.6-2.6M2.8 12.6h10.4"/></symbol>
  <symbol id="i-x" viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8"/></symbol>
  <symbol id="i-cam" viewBox="0 0 16 16"><rect x="1.8" y="4.2" width="8.4" height="7.6" rx="1.5"/><path d="M10.2 7.2 14 5v6l-3.8-2.2"/></symbol>
  <symbol id="i-hist" viewBox="0 0 16 16"><path d="M2.5 8a5.5 5.5 0 1 1 1.6 3.9"/><path d="M2.3 8.5 2.5 6l2.3 1.2M8 5.4v2.8l1.9 1.2"/></symbol>
  <symbol id="i-eye" viewBox="0 0 16 16"><path d="M1.8 8S4 4.2 8 4.2 14.2 8 14.2 8 12 11.8 8 11.8 1.8 8 1.8 8z"/><circle cx="8" cy="8" r="1.7"/></symbol>
  <symbol id="i-keys" viewBox="0 0 16 16"><rect x="1.5" y="4" width="13" height="8.5" rx="1.5"/><path d="M4 6.5h.01M6.5 6.5h.01M9 6.5h.01M11.5 6.5h.01M4 8.8h.01M6.5 8.8h.01M9 8.8h.01M11.5 8.8h.01M5 11h6"/></symbol>
  <symbol id="i-walk" viewBox="0 0 16 16"><circle cx="8.6" cy="2.8" r="1.3"/><path d="M8.4 4.6 6.6 8l1.8 2-1 3.6M6.6 8 4.8 9.2M8.4 10l2.4 1.2 1 2.4M8.8 6l2 1.4"/></symbol>
  <symbol id="i-pen" viewBox="0 0 16 16"><path d="M8 13.5h5.5"/><path d="M11 2.5a1.4 1.4 0 0 1 2 2L5 12.5l-2.7.7.7-2.7L11 2.5z"/></symbol>
  <symbol id="i-trash" viewBox="0 0 16 16"><path d="M3 4.5h10M6.4 4.2V3h3.2v1.2M4.4 4.6l.7 9.4h5.8l.7-9.4M6.7 7v4.6M9.3 7v4.6"/></symbol>
</svg>
<div class="wrap">

  <div id="login">
    <div style="text-align:center;margin-bottom:18px"><span class="logo">COACH<b>APP</b></span><div class="muted" style="font-size:13px;margin-top:4px">Coaching-platform · werkversie</div></div>
    <div class="card">
      <div class="tabs">
        <button id="tab-in" class="on" onclick="setMode('in')">Inloggen</button>
        <button id="tab-up" onclick="setMode('up')">Account maken</button>
      </div>
      <div class="field"><label>E-mailadres</label><input id="email" type="email" placeholder="naam@voorbeeld.nl"></div>
      <div class="field"><label>Wachtwoord</label><input id="pw" type="password" placeholder="••••••••"></div>
      <button class="btn" id="go" style="width:100%" onclick="submitAuth()">Inloggen</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <datalist id="exlist"></datalist>
    <div class="topbar">
      <span class="logo">COACH<b>APP</b></span>
      <span class="rolepill" id="roleLabel">…</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <div class="av" id="avatar">?</div>
        <button class="btn ghost sm" onclick="signOut()">Uitloggen</button>
      </div>
    </div>
    <div id="content"><div class="spin">Laden…</div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app/state.js"></script>
<script src="app/auth.js"></script>
<script src="app/coach-shell.js"></script>
<script src="app/dashboard.js"></script>
<script src="app/klanten.js"></script>
<script src="app/bibliotheek.js"></script>
<script src="app/panelen.js"></script>
<script src="app/chat.js"></script>
<script src="app/lid.js"></script>
<script src="app/klant-scherm.js"></script>
<script>

(async()=>{const{data:{session}}=await db.auth.getSession();if(session)await loadApp();else show("login");})();
</script>
</body>
</html>
